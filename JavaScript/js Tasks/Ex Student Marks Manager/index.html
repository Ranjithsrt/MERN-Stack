    let editIndex = null;

    // Display Table

    function displayStudents(list) {
      let StdTableBody = document.getElementById("StdTableBody");
      StdTableBody.innerHTML = "";

      list.forEach((student, index) => {
        let row = `
            <tr>
              <td>${student.name}</td>
              <td>${student.rollNo}</td>
              <td>${student.marks[0]}</td>
              <td>${student.marks[1]}</td>
              <td>${student.marks[2]}</td>
              <td>${student.marks[3]}</td>
              <td>${student.marks[4]}</td>
              <td>${student.total}</td>
              <td>${student.percentage}</td>
              <td>${student.result}</td>
              <td><button onclick="editStudent(${index})">Edit</button></td>
              <td><button onclick="deleteStudent(${index});alert('Student deleted')">Delete</button></td>
            </tr>
          `;
        StdTableBody.innerHTML += row;
      });
    }

    // Load Data

    function loadData() {
      let studentList = JSON.parse(localStorage.getItem("studentList")) || [];
      displayStudents(studentList);
      updateStats(); // update total, pass, fail, average
    }

    // Save Data
    function saveData() {
      const StdName = document.getElementById("StdName").value.trim();
      const StdRollNo = document.getElementById("StdRollNo").value.trim();
      const StdMark1 = document.getElementById("StdMark1").value.trim();
      const StdMark2 = document.getElementById("StdMark2").value.trim();
      const StdMark3 = document.getElementById("StdMark3").value.trim();
      const StdMark4 = document.getElementById("StdMark4").value.trim();
      const StdMark5 = document.getElementById("StdMark5").value.trim();
      const ErrorMsg = document.getElementById("ErrorMsg");

      if (
        !StdName ||
        !StdRollNo ||
        !StdMark1 ||
        !StdMark2 ||
        !StdMark3 ||
        !StdMark4 ||
        !StdMark5
      ) {
        ErrorMsg.textContent = "Please fill all the fields";
        ErrorMsg.style.color = "Red";
        ErrorMsg.style.fontSize = "20px";
        ErrorMsg.style.textAlign = "center";
        ErrorMsg.style.marginTop = "10px";
        return;
      }

      if (
        isNaN(StdMark1) ||
        isNaN(StdMark2) ||
        isNaN(StdMark3) ||
        isNaN(StdMark4) ||
        isNaN(StdMark5)
      ) {
        ErrorMsg.textContent = "Marks must be numbers";
        ErrorMsg.style.color = "orange";
        ErrorMsg.style.fontSize = "20px";
        ErrorMsg.style.textAlign = "center";
        ErrorMsg.style.marginTop = "10px";
        return;
      }

      if (
        StdMark1 < 0 ||
        StdMark2 < 0 ||
        StdMark3 < 0 ||
        StdMark4 < 0 ||
        StdMark5 < 0
      ) {
        ErrorMsg.textContent = "Marks cannot be negative";
        ErrorMsg.style.color = "orange";
        ErrorMsg.style.fontSize = "20px";
        ErrorMsg.style.textAlign = "center";
        ErrorMsg.style.marginTop = "10px";
        return;
      }

      if (
        StdMark1 > 100 ||
        StdMark2 > 100 ||
        StdMark3 > 100 ||
        StdMark4 > 100 ||
        StdMark5 > 100
      ) {
        ErrorMsg.textContent = "Marks cannot be greater than 100";
        ErrorMsg.style.color = "orange";
        ErrorMsg.style.fontSize = "20px";
        ErrorMsg.style.textAlign = "center";
        ErrorMsg.style.marginTop = "10px";
        return;
      }

      let student = {
        name: StdName,
        rollNo: StdRollNo,
        marks: [StdMark1, StdMark2, StdMark3, StdMark4, StdMark5],
      };

      let studentList = JSON.parse(localStorage.getItem("studentList")) || [];

      // Calculate total, percentage and result for both new and edited students
      student.marks = student.marks.map((mark) => Number(mark)); // Convert marks to numbers
      student.total = student.marks.reduce((a, b) => a + b, 0);
      student.percentage = Number(((student.total / 500) * 100).toFixed(2));

      // Check if any subject has marks less than 35
      const hasFailedSubject = student.marks.some((mark) => mark < 35);
      student.result = hasFailedSubject ? "Fail" : "Pass";

      if (editIndex !== null) {
        studentList[editIndex] = student;
      } else {
        studentList.push(student);
      }
      localStorage.setItem("studentList", JSON.stringify(studentList));
      alert("Student added!");

      loadData();
      restform();
    }

    // Reset form

      document.getElementById("StdMark3").value = student.marks[2];
      document.getElementById("StdMark4").value = student.marks[3];
      document.getElementById("StdMark5").value = student.marks[4];

      student.total = student.marks.reduce((a, b) => a + b, 0);
      student.percentage = Number(((student.total / 500) * 100).toFixed(2));
      student.result = student.percentage >= 35 ? "Pass" : "Fail";

      // studentList.push(student);
      localStorage.setItem("studentList", JSON.stringify(studentList));

      document.getElementById("AddBtn").textContent = "Update Student";

      editIndex = index;
    }

    // Delete student

      let studentList = JSON.parse(localStorage.getItem("studentList")) || [];
      studentList.splice(index, 1);
      localStorage.setItem("studentList", JSON.stringify(studentList));
      loadData();
    }

    // Stats

    function updateStats() {
      let studentList = JSON.parse(localStorage.getItem("studentList")) || [];
      const total = studentList.length;
      const passed = studentList.filter((s) => s.result === "Pass").length;
      const failed = studentList.filter((s) => s.result === "Fail").length;
      const avg =
        total > 0
          ? (
            studentList.reduce((a, s) => a + s.percentage, 0) / total
          ).toFixed(2)
          : 0;

      /*

Breakdown:
      
     total > 0
            → If there are students, calculate average
            → If no students, average = 0

    reduce((a, s) => a + s.percentage, 0)
            → Adds all students' percentages together
              Example: 80 + 60 + 90 = 230

    / total
            → divides to get average
              Example: 230 / 3 = 76.67

    .toFixed(2)
           → keeps only 2 decimal places
   
  */

      document.getElementById("StdTot").textContent = total;
      document.getElementById("StdPass").textContent = passed;
      document.getElementById("StdFail").textContent = failed;
      document.getElementById("StdAvg").textContent = avg;

      document.getElementById("StdPerc").textContent = `(${(
        (passed / (total || 1)) *
        100
      ).toFixed(1)}%)`;

      /*
      
Breakdown:

      (total || 1) → avoids dividing by zero

      passed / total → pass ratio

      * 100 → convert to percentage

      .toFixed(1) → one decimal place

      Wrapped in "()" for display.

Example:
    Passed = 7, Total = 10 → (70.0%)
      
*/
      document.getElementById("StdFailPerc").textContent = `(${(
        (failed / (total || 1)) *
        100
      ).toFixed(1)}%)`;
    }

    /*
    
Breakdown:

    (total || 1) → avoids dividing by zero

    failed / total → pass ratio

    * 100 → convert to percentage

    .toFixed(1) → one decimal place

    Wrapped in "()" for display.

Example:
failed = 7, Total = 10 → (70.0%)
    

*/

      let list = JSON.parse(localStorage.getItem("studentList")) || [];
      let results = list.filter((s) => s.name.toLowerCase().includes(input));
      displayStudents(results);
    }
