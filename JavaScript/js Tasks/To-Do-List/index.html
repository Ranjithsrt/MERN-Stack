<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cizen:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <h1>To-Do List</h1>
        <div id="todo-group">
            <input type="text" id="taskInput" placeholder="Add a new task..." />
            <button id="addTaskBtn" onclick="addNewTask()">Add Task</button>
            <button id="ClearAllBtn" onclick="todoList.clearAllTask()">
                Clear All
            </button>
            <button id="clearCompleteBtn" onclick="todoList.clearCompleteTask()">
                Clear Complete
            </button>
        </div>
        <ul id="taskList"></ul>
        <p id="successMsg" style="display: none">Task Add successfully</p>
        <div id="deleteMsg" style="display: none">Delete successfully</div>
    </div>
    <script>
        const todoList = {
            tasks: [
                { id: 1, description: "Sample Task ONE", completed: false },
                { id: 2, description: "Sample Task TWO", completed: false },
                { id: 3, description: "Sample Task THREE", completed: true },
            ],

            addTask: function (description) {
                const task = {
                    id: this.tasks.length + 1,
                    description: description,
                    completed: false,
                };
                this.tasks.push(task);
                console.log(
                    `Task added: ${task.id} ${task.description} ${task.completed}`
                );
            },

            completeTask: function (id) {
                const task = this.tasks.find((task) => task.id === id);
                if (task) {
                    task.completed = task.completed ? false : true;
                    this.listTasks();
                }
            },

            listTasks: function () {
                const ul = document.querySelector("ul");
                let output = "";
                this.tasks.forEach((task, index) => {
                    output += `<li>
            <span onclick='todoList.completeTask(${task.id})' class="${task.completed ? "completed" : ""
                        }" >${index + 1}. ${task.description}</span>
             <button onclick="todoList.editTask(${task.id})" >Edit</button>
             <button onclick="todoList.deleteTask(${task.id})">Delete</button>
            </li>`;
                });
                ul.innerHTML = output;
            },

            //   editTask: function (id) {
            //       const task = this.tasks.find((t) => t.id === id);
            //       if (task) {
            //           const newDescription = prompt(
            //               "Edit your task:",
            //               task.description
            //           );
            //           if (newDescription !== null && newDescription.trim() !== "") {
            //               task.description = newDescription.trim();
            //               this.listTasks();
            //           }
            //       }
            //   },

            editTask: function (id) {
                const task = this.tasks.find((t) => t.id === id);
                if (task) {
                    const taskInput = document.getElementById("taskInput");
                    taskInput.value = task.description; // put old value in input box

                    // Change Add button to Save
                    const addBtn = document.getElementById("addTaskBtn");
                    addBtn.textContent = "Save Task";

                    // Replace onclick temporarily
                    addBtn.onclick = () => {
                        const newDescription = taskInput.value.trim();
                        if (newDescription) {
                            task.description = newDescription;
                            this.listTasks();
                            taskInput.value = "";
                            addBtn.textContent = "Add Task";
                            addBtn.onclick = addNewTask; // restore normal add
                        } else {
                            alert("Task cannot be empty!");
                        }
                    };
                }
            },

            deleteTask: function (id) {
                const updatedTasks = this.tasks.filter((task) => task.id !== id);
                const deleteMsg = document.getElementById("deleteMsg");

                if (updatedTasks.length !== this.tasks.length) {
                    this.tasks = updatedTasks;
                    // display delete message
                    deleteMsg.style.display = "block";
                    setTimeout(() => {
                        deleteMsg.style.display = "none";
                    }, 1000);

                    this.listTasks();
                }
            },

            clearAllTask: function () {
                this.tasks = [];
                this.listTasks();
            },

            clearCompleteTask: function () {
                this.tasks = this.tasks.filter((task) => !task.completed);
                this.listTasks();
            },
        };

        todoList.listTasks();

        function addNewTask() {
            const taskInput = document.getElementById("taskInput");
            const successMsg = document.getElementById("successMsg");
            const description = taskInput.value.trim();
            if (description) {
                todoList.addTask(description);
                todoList.listTasks();
                taskInput.value = "";
                // Show success message
                successMsg.style.display = "block"; // Show success message
                setTimeout(() => {
                    successMsg.style.display = "none";
                }, 1000);
            } else {
                alert("Please enter a task description.");
            }
        }

        // todoList.addTask("Sample Task ONE");
        // todoList.addTask("Sample Task TWO");
        // todoList.completedTask(1);
        // todoList.listTasks();
        // todoList.deleteTask(2);
        // todoList.listTasks();
    </script>
</body>

</html>
