<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    .container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 100px);
      gap: 10px;
    }

    [class^="box"] {
      background-color: teal;
      padding: 20px;
      color: #fff;
      font-size: 20px;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: 0.5s;
    }
  </style>
</head>

<body>
  <h3>Mouse Events</h3>
  <div class="container">
    <div class="box-1">click</div>
    <div class="box-2">dblclick</div>
    <div class="box-3">mousedown</div>
    <div class="box-4">mouseout</div>
    <div class="box-5">mouseup</div>
    <div class="box-6">mouseover</div>
    <div class="box-7">All</div>
  </div>

  <script>
    const box1 = document.querySelector(".box-1");
    box1.addEventListener("click", function () {
      console.log("Box-1 I am clicked");
    });

    const box2 = document.querySelector(".box-2");
    box2.addEventListener("dblclick", function () {
      console.log("Box-2 I am Dblclicked");
    });

    const box3 = document.querySelector(".box-3");
    box3.addEventListener("mousedown", function (e) {
      e.target.style.background = "purple";
    });

    const box4 = document.querySelector(".box-4");
    box4.addEventListener("mouseout", function (e) {
      e.target.style.background = "purple";
    });

    const box5 = document.querySelector(".box-5");
    box5.addEventListener("mouseup", function (e) {
      e.target.style.background = "purple";
    });

    const box6 = document.querySelector(".box-6");
    box6.addEventListener("mouseover", function (e) {
      e.target.style.background = "purple";
    });

    const box7 = document.querySelector(".box-7");
    box7.addEventListener("mouseover", function (e) {
      e.target.style.background = "purple";
      e.target.textContent = "hover";
    });

    box7.addEventListener("mouseout", function (e) {
      e.target.style.background = "red";
      e.target.textContent = "mouseout";

      setTimeout(() => {
        e.target.style.background = "teal";
        e.target.textContent = "All";
      }, 2000);
    });
  </script>
</body>

</html>
