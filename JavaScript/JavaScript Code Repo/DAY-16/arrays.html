<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let a = 25;
      console.log(a);
      a = 45;
      console.log(a);
      console.log("---------------");
      let arr = [25, 45, 85, 95];
      console.log(arr[0]);
      console.log(arr[1]);

      // Array with mixed types
      let bio = ["Ram", 25, "Salem", "M", [50, 75, 85, 96, 58], 95.25, false, { address: "Cheery Road", pincode: "636007" }];
      console.log(bio);
      console.log(bio.length);

      console.log("---------------");
      //Creating Arrays
      /*
          - Array literal: []
          - Array constructor: new Array()
      */

      //Array literal: []
      let marks = [25, 45, 85, 95];
      console.log(marks);
      //Array constructor: new Array()
      let numbers = new Array(1, 2, 3, 4, 5);
      console.log(numbers);

      //Array Properties
      console.log(marks.length);
      marks.length = 2; // Truncates array
      console.log(marks);
      console.log("---------------");
    </script>
  </body>
</html>
