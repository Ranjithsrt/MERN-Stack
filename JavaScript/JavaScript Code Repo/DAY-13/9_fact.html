<!DOCTYPE html>

  <body>
    <p>Write a program to find the factorial of the given number. Enter The number: 5 Factorial 5 is: 120</p>

    <script>
      const number = 5;
      let fact = 1;
      for (let i = 1; i <= number; i++) {
        fact *= i; //fact=fact*i
      }
      console.log(`Factorial of ${number} is ${fact}`);
    </script>
  </body>
