<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

  <body>
    <p>Write a program to find the Fibonacci Series of the given number. Enter the Limit: 8</p>
    <script>
      const limit = 4;
      let a = -1;
      let b = 1;
      let c;
      for (let i = 1; i <= limit; i++) {
        //1<=4  2<=4 3<=4  4<=4  5<=4
        c = a + b; //-1+1=>0   1+0=> 1  0+1=>1  1+1=>2
        console.log(c); //0  1  1   2
        a = b;//1  0   1   1
        b = c;//0  1   1   2
      }
    </script>
  </body>
</html>
