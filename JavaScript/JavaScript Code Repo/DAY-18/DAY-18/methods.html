      //reduce => left to Right
      //array.reduce(callback(accumulator, currentValue, index, array), initialValue)

      let arr = [1, 2, 3, 4];
      let sum = arr.reduce((acc, curr) => acc + curr, 0);
      /*
          acc     curr      result
          0         1        0+1 => 1
          1         2        1+2 => 3
          3         3        3+3 => 6
          6         4        6+4 => 10
          10

      let numbers = [3, 9, 35, 8, 5];
      console.log(Math.max(...numbers));

      let greatest = numbers[0]; //3
      for (i = 1; i < numbers.length; i++) {
        //1<5 2<5 3<5 4<5 5<5
        if (numbers[i] > greatest) {
          //9>3 20>9 8>20 5>20
          greatest = numbers[i]; //9 20
        }
      }
      console.log(greatest);

      greatest = numbers.reduce((acc, curr) => (curr > acc ? curr : acc), numbers[0]);
