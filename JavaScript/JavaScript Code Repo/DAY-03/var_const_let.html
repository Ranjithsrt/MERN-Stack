<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      var a; // Variable declaration
      a = 10; // Value Assignment
      var b = 20;
      var c = a + b;
      document.write("Total : ", c);
      a = "Ram"; //Reassignment
      document.write(a);
      var a = 25.55; //Redeclaration

      //const x = 25;
      //x = 500;
      // const x = 45;

      /* 
      Type         declaration   Assignment     Reassignment     Redeclaration
      var             Yes          Yes            Yes              Yes
      let             Yes          Yes            Yes              No
      const           Yes          Yes            No               No
      
      */
    </script>
  </body>
</html>
