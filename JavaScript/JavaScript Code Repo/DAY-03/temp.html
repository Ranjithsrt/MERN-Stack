<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>4. Temperature of a city in Fahrenheit degrees is input through the keyboard. Write a program to convert this temperature into Centigrade degrees. (F − 32) × 5/9</p>

    <script>
      const fahrenheit = 98;
      const centigrade = (fahrenheit - 32) * (5 / 9);
      document.write(`Centigrade degrees is ${centigrade}`);
    </script>
  </body>
</html>
