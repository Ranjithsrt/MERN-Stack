<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>ToDO List</title>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white p-6 rounded-lg shadow-lg">
    <h2 class="text-2xl font-semibold text-gray-800 mb-4">📝 To-Do List</h2>

    <div class="flex mb-4">
      <input type="text" id="taskInput" placeholder="Enter a new Task"
        class="border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-100 p-3 flex-grow" />
      <button class="bg-blue-500 text-white p-3 rounded hover:bg-blue-600 transition cursor-pointer"
        onclick="addTask()">
        Add Task
      </button>
    </div>
    <button class="mb-4 bg-red-500 text-white p-3 rounded-lg hover:bg-red-600 transition cursor-pointer"
      onclick="clearCompleted()">
      Clear Completed
    </button>
    <ul id="taskList" class="select-none space-y-2"></ul>
  </div>

  <script>
    let tasks = [
      { text: "Cooking", completed: false },
      { text: "Upload Video", completed: false },
      { text: "Play Music", completed: true },
      { text: "Do Homework", completed: false },
    ];

    function addTask() {
      const taskInput = document.querySelector("#taskInput");
      const taskText = taskInput.value.trim();
      if (!taskText) {
        alert("Please enter the task!..");
        return;
      }
      tasks.push({ text: taskText, completed: false });
      taskInput.value = "";
      displayTasks();
    }

    function displayTasks() {
      console.log(tasks);
      const taskList = document.querySelector("#taskList");
      taskList.innerHTML = "";
      let liElements = "";
      tasks.forEach((task, index) => {
        liElements += `
              <li class="flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition">
                <span onclick="toggleComplete(${index})" class="${task.completed ? "line-through text-gray-500" : " text-gray-800"
          } cursor-pointer">${task.text}</span>
                <button class="bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-600 transition" onclick="deleteTask(${index})">Delete</button></li>
              </li>`;
      });
      taskList.innerHTML = liElements;
    }

    function toggleComplete(index) {
      tasks = tasks.map((task, i) =>
        i === index ? { ...task, completed: !task.completed } : task
      );
      displayTasks();
    }

    function deleteTask(index) {
      if (confirm("Are you sure to delete ?")) {
        tasks.splice(index, 1);
        displayTasks();
      }
    }

    function clearCompleted() {
      tasks = tasks.filter((task) => !task.completed);
      displayTasks();
    }

    displayTasks();
  </script>
</body>

</html>
