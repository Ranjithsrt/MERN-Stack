<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #ffffff;
        transition: background-color 0.5s ease, color 0.5s ease;
      }

      .container {
        text-align: center;
        padding: 20px;
        max-width: 1200px;
        width: 100%;
      }
      h2 {
        font-size: 2.5em;
        margin-bottom: 20px;
        font-weight: 500;
      }

      .palette {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
        padding: 20px;
      }

      .color-box {
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1em;
        font-weight: 500;
        text-align: center;
        border-radius: 5px;
        cursor: pointer;
        border: 1px solid #ebe8e8;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .color-box:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Color Gallery</h2>
      <div class="palette" id="palette"></div>
    </div>
    <script>
      const colors = ["#1ABC9C", "#2ECC71", "#3498DB", "#9B59B6", "#34495E", "#16A085", "#27AE60", "#2980B9", "#8E44AD", "#2C3E50", "#F1C40F", "#E67E22", "#E74C3C", "#ECF0F1", "#95A5A6", "#F39C12", "#D35400", "#C0392B", "#BDC3C7", "#7F8C8D"];

      const palette = document.getElementById("palette");
      colors.forEach((color, index) => {
        console.log(index, color);
        const box = document.createElement("div");
        box.className = "color-box";
        box.style.background = color;
        box.innerHTML = color;

        const r = parseInt(color.slice(1, 3), 16);
        const g = parseInt(color.slice(3, 5), 16);
        const b = parseInt(color.slice(5, 7), 16);
        //console.log(r, g, b);

        const luminance = (0.299 * r + 0.587 * g + 0.144 * b) / 255;
        //console.log(luminance);

        box.style.color = luminance > 0.5 ? "#000000" : "#ffffff";

        palette.append(box);
      });
    </script>
  </body>
</html>
