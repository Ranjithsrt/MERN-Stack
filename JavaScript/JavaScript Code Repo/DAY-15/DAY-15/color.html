<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }
      body {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #ffffff;
        transition: background-color 0.5s ease;
      }
      h1 {
        font-weight: 500;
      }
      button {
        padding: 15px 30px;
        font-size: 1.2em;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin: 10px 0;
      }
      button:hover {
        background-color: #45a049;
      }
      p {
        font-size: 1.5em;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Random Background Color Generator</h1>
      <button onclick="changeColor()">Generate New Color</button>
      <p id="colorCode">Current Color : #ffffff</p>
    </div>

    <script>
      function changeColor() {
        const hexDigits = "0123456789ABCDEF";
        let color = "#";
        for (let i = 0; i < 6; i++) {
          color += hexDigits[Math.floor(Math.random() * 16)];
        }
        document.body.style.backgroundColor = color;
        document.querySelector("#colorCode").innerHTML = `Current Color: ${color}`;

        const r = parseInt(color.slice(1, 3), 16);
        const g = parseInt(color.slice(3, 5), 16);
        const b = parseInt(color.slice(5, 7), 16);
        //console.log(r, g, b);

        const luminance = (0.299 * r + 0.587 * g + 0.144 * b) / 255;
        //console.log(luminance);

        document.body.style.color = luminance > 0.5 ? "#000000" : "#ffffff";
      }
    </script>
  </body>
</html>
