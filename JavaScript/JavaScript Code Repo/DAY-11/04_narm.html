<!DOCTYPE html>
<html lang="en">
  <head>

  <body>
    <p>3. Write a program to find the given number is Armstrong number or not.</p>

    <script>
      for (let i = 1; i <= 100000; i++) {
        let numStr = i.toString();
        let digits = numStr.length;
        let number = Number(numStr);
        let sum = 0;
        while (number > 0) {
          rem = number % 10;
          sum += Math.pow(rem, digits);
          number = Math.floor(number / 10);
        }
        if (numStr == sum) {
          console.log(`${numStr} is an armstrong number`);
        }
      }
    </script>
  </body>
</html>
