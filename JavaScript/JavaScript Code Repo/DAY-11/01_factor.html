<!DOCTYPE html>
<html lang="en">
  <head>

    <title>Document</title>

  <body>
    <p>1. Write a program to find the factor of the given number.</p>
    <script>
      let number = 8;
      for (let i = 1; i <= number; i++) {
        if (number % i == 0) {
          console.log("Factor : " + i);
        }
      }
    </script>
  </body>
