  <body>
    <p>5. Write a program to count and print the number of odd and even numbers. [2,85,6,77,5]</p>
    <script>
      let numbers = [2, 85, 6, 77, 5];
      let even = 0;
      let odd = 0;
      /*
      for (let i = 0; i < numbers.length; i++) {
        // console.log(numbers[i]);
        if (numbers[i] % 2 == 0) {
          even++;
        } else {
          odd++;
        }
      }*/

      for (number of numbers) {
        if (number % 2 == 0) {
          even++;
        } else {
          odd++;
        }
      }
      console.log("Total Even Number : " + even);
      console.log("Total Odd Number : " + odd);
    </script>
  </body>
