<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>Write a program to find the reverse of n digit number using While loop (Clue : % //)</p>
    <script>
      let number = 12345;
      let result = 0;
      while (number > 0) {
        //12345>0 1234>0 123>0 12>0 1>0 0>0
        rem = number % 10;
        //console.log(rem); //5 4 3 2 1
        result = result * 10 + rem;
        /*
        0 * 10 + 5 => 5
        5 * 10 + 4 => 50+4  => 54
        54* 10 + 3 =? 540 + 3 =>543
        543 * 10 + 2 => 5430 + 2 =>5432
        5432 * 10 + 1 => 54320 + 1 => 54321
 
        */
        number = Math.floor(number / 10); //1234 123 12 1 0
      }
      console.log(result);
    </script>
  </body>
</html>
