<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>Write a program to find the decimal number from given Binary number.</p>
    <script>
      let binary = "11100";
      //            0123
      let decimal = 0;
      for (let i = 0; i < binary.length; i++) {
        console.log(i, binary[i]); // 0 '1' 1 '1'
        decimal += parseInt(binary[i]) * Math.pow(2, binary.length - 1 - i);
        // 1 * 2^3 => 0+8
        // 1 x 2^2 => 8+4 =>12
        // 0 x 2^1 => 12+0 => 12
        // 0 x 2^0 => 12+0 => 12
      }
      console.log("Decimal : " + decimal);
    </script>
  </body>
</html>
