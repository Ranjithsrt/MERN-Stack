<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>.Write a program to find the binary number from given decimal number.</p>
    <script>
      let decimal = 28;
      let binary = "";
      let num = decimal;
      while (num > 0) {
        binary = (num % 2) + binary;
        num = Math.floor(num / 2);
      }
      console.log(`${decimal} Binary Equal to : ${binary}`);
    </script>
  </body>
</html>
