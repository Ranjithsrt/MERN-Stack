<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <ul>
      <li>C</li>
      <li>C++</li>
      <li>Java</li>
    </ul>

    <script>
      const liElements = document.getElementsByTagName("li");
      console.log(liElements.length);
      console.log(liElements);

      let liNodes = document.querySelectorAll("li");
      console.log(liNodes.length);
      console.log(liNodes);

      const liElement = document.createElement("li"); //<li></li>
      liElement.textContent = "JavaScript"; //<li>JavaScript</li>

      const ul = document.querySelector("ul");
      ul.append(liElement);

      console.log(liElements);
      console.log(liElements.length);

      console.log("Before Reselect : ", liNodes.length);
      console.log(liNodes);

      liNodes = document.querySelectorAll("li");
      console.log("After Reselect : ", liNodes.length);
      console.log(liNodes);
    </script>
  </body>
</html>
