  <body>
    <p>12. If the total selling price of 15 items and the total profit earned on them is input through the keyboard, write a program to find the cost price of one item.</p>

    <script>
      const sellingPrice = 1235;
      const totalProfit = 18.25;
      const totalCostPrice = sellingPrice - totalProfit;
      const costPricePerItem = totalCostPrice / 15;
      console.log(`Cost Price of one Item : ${costPricePerItem.toFixed(2)}`);
    </script>
  </body>
