<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>6. Two numbers are input through the keyboard into two locations C and D. Write a program to interchange the contents of C and D.</p>

    <script>
      let c = 10;
      let d = 20;
      document.write(`<b>Before Interchange : </b> <br> C : ${c}<br>D : ${d}`);

      let temp = c;
      c = d;
      d = temp;
      document.write(`<br><b>After Interchange : </b> <br> C : ${c}<br>D : ${d}`);
    </script>
  </body>
</html>
