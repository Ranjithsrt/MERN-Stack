  <body>
    <p>9. If a four-digit number is input through the keyboard, write a program to obtain the sum of the first and last digit of this number.</p>

    <script>
      const num = 1234;
      let firstDigit = Math.floor(num / 1000);
      let lastDigit = num % 10;
      console.log(firstDigit, lastDigit);
    </script>
