<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <nav class="bg-pink-600 p-3">
      <a href="#" class="text-white text-xl font-semibold">School Management System</a>
    </nav>
    <div class="bg-gray-200 min-h-screen flex items-center flex-col space-y-3 justify-start">
      <form class="bg-white max-w-xl w-full shadow-lg p-3 rounded-lg mt-5">
        <div class="flex flex-col space-x-2 mb-3">
          <label for="name" class="font-semibold mb-1">Name</label>
          <input type="text" id="name" placeholder="Enter name" class="border border-gray-400 px-2 py-1 rounded focus:outline-none" />
        </div>
        <div class="flex flex-col space-x-2 mb-3">
          <label for="rollno" class="font-semibold mb-1">Roll No</label>
          <input type="text" id="rollno" placeholder="Enter rollno" class="border border-gray-400 px-2 py-1 rounded focus:outline-none" />
        </div>
        <div class="flex flex-col space-x-2 mb-3">
          <label class="font-semibold mb-1">Mark Details</label>
          <div class="flex gap-2">
            <input type="text" id="english" placeholder="English" class="border border-gray-400 px-2 py-1 rounded focus:outline-none w-25" />
            <input type="text" id="maths" placeholder="Maths" class="border border-gray-400 px-2 py-1 rounded focus:outline-none w-25" />
            <input type="text" id="science" placeholder="Science" class="border border-gray-400 px-2 py-1 rounded focus:outline-none w-25" />
            <input type="text" id="social" placeholder="Social" class="border border-gray-400 px-2 py-1 rounded focus:outline-none w-25" />
            <input type="text" id="tamil" placeholder="tamil" class="border border-gray-400 px-2 py-1 rounded focus:outline-none w-25" />
          </div>
          <div class="mt-3 flex gap-3">
            <button class="bg-blue-700 text-white px-2 py-1 rounded hover:bg-blue-800">Add Student</button>
            <button class="bg-red-700 text-white px-2 py-1 rounded hover:bg-red-800">Clear All</button>
          </div>
        </div>
      </form>

      <table class="w-full bg-white shadow-md">
        <thead>
          <tr>
            <th class="p-2 font-semibold bg-pink-600 text-white">S.No</th>
            <th class="p-2 font-semibold bg-pink-600 text-white">Name</th>
            <th class="p-2 font-semibold bg-pink-600 text-white">Roll No</th>
            <th class="p-2 font-semibold bg-pink-600 text-white">English</th>
            <th class="p-2 font-semibold bg-pink-600 text-white">Maths</th>
            <th class="p-2 font-semibold bg-pink-600 text-white">Science</th>
            <th class="p-2 font-semibold bg-pink-600 text-white">Social</th>
            <th class="p-2 font-semibold bg-pink-600 text-white">Tamil</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
          </tr>
          <tr>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
          </tr>
          <tr>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
            <td>&nbsp;</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
