<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h3>Relational Operators in JavaScript</h3>
    <ul>
      <li>Equal to (==)</li>
      <li>Strict Equal to (===)</li>
      <li>Not Equal to (!=)</li>
      <li>Greater Than (>)</li>
      <li>Less Than (<)</li>
      <li>Greater Than or Equal to (>=)</li>
      <li>Less Than or Equal to (<=)</li>
    </ul>

    <script>
      let a = 25; //Number
  
      console.log(a == 25);
      console.log(a == "25");
      console.log(a === "25"); //data & data type
      console.log(a === 25);
      console.log(a != 25);
      console.log(a != 45);

      console.log(a > 10);
      console.log(a < 45);

      console.log(a >= 25);
      console.log(a <= 25);
    </script>
  </body>
</html>
