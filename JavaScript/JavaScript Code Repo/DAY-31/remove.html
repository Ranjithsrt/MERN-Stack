<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        padding: 10px;
        background-color: aliceblue;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div id="box1">
      <p>This is Para-1</p>
      <p>This is Para-2</p>
    </div>
    <div id="box2">
      <p>This is Para-3</p>
      <p>This is Para-4</p>
    </div>

    <script>
      const box1 = document.getElementById("box1");
      box1.remove();

      const box2 = document.getElementById("box2");
      const para = box2.children[0];

      box2.removeChild(para);
    </script>
  </body>
</html>
