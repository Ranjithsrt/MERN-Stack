<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="p-5">
    <h3 class="font-semibold uppercase text-purple-700 tracking-wide mb-3">Food Details</h3>
    <div class="bg-slate-100 p-3 flex flex-wrap gap-3" id="box"></div>
    <script>
      function loadFoodDetails() {
        const box = document.getElementById("box");
        const xhr = new XMLHttpRequest();
        const url = "https://www.app.tutorjoes.in/mobile/getAllFood";
        xhr.open("GET", url, true);

        xhr.onload = function () {
          if (xhr.status === 200) {
            const data = JSON.parse(xhr.responseText);
            console.log(data);
            data.items.forEach((food) => {
              box.innerHTML += `
      <div class="bg-white p-3 flex gap-2 rounded-sm shadow-sm">
        <img src='https://app.tutorjoes.in/img/food/${food.PIC}' class="w-[150px]">
      <div>
          <h3 class="font-semibold mb-3">${food.NAME}</h3>
        <p class="text-sm mb-2 text-gray-400">${food.SHOP}</p>
        <p class="text-sm mb-2 text-gray-400">Rs.${food.AMT}</p>
      </div>
      </div>`;
            });
          } else {
            console.error(xhr.status);
          }
        };
        xhr.send();
      }
      loadFoodDetails();
    </script>
  </body>
</html>
