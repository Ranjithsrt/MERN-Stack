<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        padding: 30px;
        position: relative;
        min-height: 80vh;
      }
      ul li {
        display: flex;
        gap: 10px;
        width: 300px;
        justify-content: space-between;
        margin-bottom: 10px;
        margin-left: -40px;
      }
      ul li span {
        text-transform: capitalize;
        display: inline-block;
        flex: 1;
        user-select: none;
        padding: 5px 10px;
        cursor: pointer;
      }

      .completed {
        text-decoration: line-through;
      }
      #modal {
        position: absolute;
        background-color: rgba(0, 0, 0, 0.5);
        top: 0;
        left: 0;
        height: 100%;
        width: 100%;

        display: none;
        justify-content: center;
        align-items: center;
      }

      #modal.show {
        display: flex;
      }

      #modal-content {
        background-color: aliceblue;
        width: 300px;
        height: 30px;

        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <h3>To-Do List</h3>
    <input type="text" id="description" placeholder="Add Task" /> <button onclick="addNewTask()">Add</button>
    <ul></ul>

    <div id="modal" onclick="hideModal()">
      <div id="modal-content" onclick="event.stopPropagation()">
        <input type="text" id="modal-input" />
        <button onclick="updatedTasks()">Update</button>
      </div>
    </div>
  </body>
  <script>
    const todoList = {
      tasks: [
        { id: 1, description: "play music", completed: true },
        { id: 2, description: "cooking", completed: false },
      ],
      currentEditId: null,
      addTask: function (description) {
        const task = {
          id: this.tasks.length + 1,
          description: description,
          completed: false,
        };
        this.tasks.push(task);
        console.log("Task Added");
      },
      editTask: function (id, newDescription) {
        const task = this.tasks.find((task) => task.id === id);
        if (task) {
          task.description = newDescription;
          console.log("Task Updated");
        }
      },
      completeTask: function (id) {
        const task = this.tasks.find((task) => task.id === id);
        if (task) {
          task.completed = task.completed ? false : true;
          this.listTasks();
        }
      },
      listTasks: function () {
        const ul = document.querySelector("ul");
        let output = "";
        this.tasks.forEach((task, index) => {
          output += `<li>
            <span onclick='todoList.completeTask(${task.id})' class="${task.completed ? "completed" : ""}" >${index + 1}. ${task.description}</span>
            <button onclick="showModal(${task.id})">Edit</button>
            <button onclick="todoList.deleteTask(${task.id})">Delete</button>
            </li>`;
        });
        ul.innerHTML = output;
      },
      deleteTask: function (id) {
        if (confirm("Are you sure to delete?")) {
          const updatedTasks = this.tasks.filter((task) => task.id != id);
          this.tasks = updatedTasks;
          this.listTasks();
        }
      },
    };

    todoList.listTasks();

    function addNewTask() {
      const txtDescription = document.querySelector("#description");
      todoList.addTask(txtDescription.value);
      todoList.listTasks();
      txtDescription.value = "";
    }

    function showModal(id) {
      const modal = document.querySelector("#modal");
      const task = todoList.tasks.find((task) => task.id === id);
      console.log(task);

      if (task) {
        document.getElementById("modal-input").value = task.description;
        todoList.currentEditId = task.id;
        modal.classList.add("show");
      }
    }

    function hideModal() {
      const modal = document.querySelector("#modal");
      modal.classList.remove("show");
    }

    function updatedTasks() {
      const input = document.getElementById("modal-input");
      if (todoList.currentEditId) {
        todoList.editTask(todoList.currentEditId, input.value);
        hideModal();
        todoList.currentEditId = null;
        todoList.listTasks();
      }
    }
  </script>
</html>
