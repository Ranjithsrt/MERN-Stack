<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>JavaScript DOM Tutorial</h1>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Corrupti mollitia sunt tempora, nostrum error facere ex, accusantium ullam totam iusto quos necessitatibus consectetur dolore facilis impedit, at tenetur ipsum consequuntur.</p>

    <script>
      const styleSheet = document.createElement("style");
      document.head.append(styleSheet);
      styleSheet.sheet.insertRule("p{color:green}");
    </script>
  </body>
</html>
