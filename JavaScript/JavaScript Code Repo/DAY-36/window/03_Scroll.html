<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        height: 2000px;
      }
      p {
        position: fixed;
        top: 10px;
        left: 10px;
      }
    </style>
  </head>
  <body>
    <p>Scroll Position : <span>0</span></p>

    <script>
      const display = document.querySelector("span");
      window.addEventListener("scroll", function () {
        display.textContent = `${window.scrollY}`;
      });
    </script>
  </body>
</html>
