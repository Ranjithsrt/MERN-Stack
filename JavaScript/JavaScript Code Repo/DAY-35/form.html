<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f4f4f4;
      }
      form {
        width: 450px;
        background-color: #fff;
        min-height: 300px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        border-radius: 3px;
        box-shadow: rgba(60, 64, 67, 0.3) 0px 1px 2px 0px, rgba(60, 64, 67, 0.15) 0px 1px 3px 1px;
      }
      form div {
        display: flex;
        flex-direction: column;
      }

      form div.inline {
        flex-direction: row;
        align-items: center;
        gap: 10px;
        height: 20px;
        padding: 0 5px;
      }
      input,
      select {
        border: 2px solid #ebeaea;
        padding: 10px;
        border-radius: 3px;
        margin-top: 10px;
        outline: none;
      }
      button {
        padding: 10px;
        font-size: 16px;
        border: none;
        background-color: darkblue;
        color: #fff;
        border-radius: 3px;
      }
      button[type="submit"] {
        margin-top: 15px;
      }
      button[type="reset"] {
        background-color: crimson;
      }

      .focus {
        border-color: lightblue;
      }
      .form-text {
        font-weight: 300;
        font-size: 14px;
        color: crimson;
        margin-top: 5px;
        display: none;
      }
      h3 {
        font-weight: 500;
        color: crimson;
        padding-bottom: 15px;
        border-bottom: 1px solid #ccc;
        font-size: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <!---
Focus
Blur
Input
Change
submit
-->

    <form id="frm" autocomplete="off">
      <h3>User Registration</h3>
      <div>
        <label for="username">User Name</label>
        <input type="text" id="username" name="username" />
        <p class="form-text">Please fill username</p>
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" />
        <p class="form-text">Please fill password</p>
      </div>
      <div>
        <label for="course">Courses</label>
        <select id="course" name="course" multiple>
          <option value="">Select Course</option>
          <option value="C">C</option>
          <option value="C++">C++</option>
          <option value="Java">Java</option>
          <option value="Python">Python</option>
        </select>
      </div>

      <div class="inline">
        <input type="checkbox" id="agree" name="agree" />
        <label for="agree">I agree the terms & condition</label>
      </div>

      <button type="submit">Submit</button>
      <button type="reset">Clear All</button>
    </form>
    <script>
      const frm = document.getElementById("frm");

      frm.addEventListener("submit", function (e) {
        e.preventDefault(); //Stops the form from submitting (Reload)
        const formData = new FormData(frm);
        //New Key and values can be added
        formData.append("timestamp", new Date().toISOString());

        for (const [key, value] of formData.entries()) {
          console.log(`${key}:${value}`);
        }

        console.log("Before Remove agree :", formData.has("agree"));
        //update existing key
        formData.set("username", "Suresh");
        //Removes a key-value pair.
        formData.delete("agree");

        for (const [key, value] of formData.entries()) {
          console.log(`${key}:${value}`);
        }
        console.log("After Remove agree :", formData.has("agree"));
        console.log(formData.get("username"));
        console.log(formData.getAll("course"));
      });
    </script>
  </body>
</html>
