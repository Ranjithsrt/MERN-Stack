<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>

</head>

<body>
    <div class="slider">

        <div class="slider-item active">
            <img src="https://picsum.photos/id/237/800/400" alt="Beautiful Nature Landscape">
        </div>
        <div class="slider-item">
            <img src="https://picsum.photos/id/238/800/400" alt="Urban Architecture">
        </div>
        <div class="slider-item">
            <img src="https://picsum.photos/id/239/800/400" alt="Mountain Scenery">
        </div>
        <div class="slider-item">
            <img src="https://picsum.photos/id/240/800/400" alt="Ocean View">
        </div>
        <div class="slider-item">
            <img src="https://picsum.photos/id/241/800/400" alt="Sunset Scene">
        </div>

        <div class="slider-btns">
            <button id="btn-prev">
                <ion-icon name="chevron-back-outline"></ion-icon>
            </button>
            <button id="btn-next">
                <ion-icon name="chevron-forward-outline"></ion-icon>
            </button>
        </div>

        <div class="dots">

        </div>

    </div>
    <script src="./script.js"></script>
</body>

</html>
