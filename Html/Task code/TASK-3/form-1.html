<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form-1</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>
          <b>User personal information</b>
        </legend>
        <label for="full_name">Enter your full name</label><br />
        <input type="text" id="full_name" />
        <br /><br />
        <label for="email">Enter your email</label>
        <br />
        <input type="email" id="email" />
        <br /><br />
        <label for="password">Enter your password</label><br />
        <input type="password" id="password" />
        <br /><br />
        <label for="confirm_password">Confirm your password</label><br />
        <input type="password" id="confirm_password" />
        <br /><br />
        <label>Enter your gender</label><br />
        <input type="radio" name="gender" id="male" checked />
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female" />
        <label for="female">Female</label>
        <input type="radio" name="gender" id="others" />
        <label for="others">Others</label>
        <br /><br />
        <label for="dob">Enter your Date of Birth</label><br />
        <input type="date" id="dob" />
        <br /><br />
        <label for="address">Enter your Address:</label><br />
        <textarea id="address" rows="3" cols="25"></textarea>
        <br /><br />
        <button type="submit">Submit</button>
      </fieldset>
    </form>
  </body>
</html>
