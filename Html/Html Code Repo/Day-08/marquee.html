    <style>
      .marquee {
        width: 150px;
        padding: 10px;
        white-space: nowrap;
        animation: scroll 10s linear infinite;
      }
      @keyframes scroll {
        0% {
          transform: translateX(100%);
        }
        100% {
          transform: translateX(-100%);
        }
      }
    </style>
  </head>
