<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Navbar & Footer</title>
    {% load static %}

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Your Custom CSS (optional) -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />

    <!-- Bootstrap download (if you are using local copy) -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
  </head>

  <body>
    <!-- ✅ NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">MyDjangoSite</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Services</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <h1 class="text-center mt-5">Bootstrap</h1>

    <div class="container mt-5">
      <div class="col-md-offset-1 col-md-3">
        <!-- <form action="/updateData/{{data.id}}" method="POST" autocomplete="off"> -->
        <form
          action="{% url 'updateData' data.id %}"
          method="POST"
          autocomplete="off"
        >
          {% csrf_token %}

          <h3 class="page-header text-center text-primary">REGISTRATION</h3>
          <div class="form-group mb-3">
            <label for="name">Name</label>
            <input
              type="text"
              class="form-control"
              name="name"
              value="{{data.Name}}"
              id="name"
              placeholder="Enter your name"
            />
          </div>
          <div class="form-group mb-3">
            <label for="Age">Age</label>
            <input
              type="text"
              class="form-control"
              name="Age"
              id="Age"
              placeholder="Enter your Age"
              value="{{data.Age}}"
            />
          </div>
          <div class="form-group mb-3">
            <label for="Address">Address</label>
            <input
              type="text"
              class="form-control"
              name="Address"
              id="Address"
              placeholder="Enter your Address"
              value="{{data.Address}}"
            />
          </div>
          <div class="form-group mb-3">
            <label for="Contact">Contact</label>
            <input
              type="text"
              class="form-control"
              name="Contact"
              id="Contact"
              placeholder="Enter your Contact"
              value="{{data.Contact}}"
            />
          </div>
          <div class="form-group mb-3">
            <label for="Email">Email</label>
            <input
              type="text"
              class="form-control"
              name="Email"
              id="Email"
              placeholder="Enter your Email"
              value="{{data.Email}}"
            />
          </div>
          <div class="form-group pull-right mt-4">
            <input type="submit" class="btn btn-primary" value="Update" />
          </div>
        </form>
      </div>
    </div>

    <!-- ✅ FOOTER -->
    <footer class="bg-dark text-white text-center py-3 mt-5 fixed-bottom">
      <div class="container">
        <p>&copy; 2025 MyDjangoSite. All rights reserved.</p>
        <p>
          <a href="#" class="text-white me-2">Privacy Policy</a> |
          <a href="#" class="text-white ms-2">Terms of Service</a>
        </p>
      </div>
    </footer>

    <!-- Bootstrap JS (needed for navbar toggler) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
