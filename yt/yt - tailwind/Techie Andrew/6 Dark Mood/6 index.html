 <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        /* Dark mode custom CSS */
        body.dark {
            background-color: #111827;
            /* gray-900 */
            color: #f3f4f6;
            /* gray-100 */
        }
        /* @import "tailwindcss";
@custom-variant dark (&:where(.dark, .dark *)); */
    </style>
</head>

<body class="bg-white text-gray-900 transition-colors duration-300">

    <!-- Dark Mode Component -->
    <div class="min-h-screen flex flex-col items-center justify-center">
        <h1 class="text-4xl mb-6">Dark Mode Toggle</h1>

        <button id="darkBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors">
            Toggle Dark Mode
        </button>
    </div>

    <script>
        const btn = document.getElementById("darkBtn");
        btn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
        });
    </script>

</body>

</html>
