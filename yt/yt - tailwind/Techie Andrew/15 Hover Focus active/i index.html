<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="container p-5 m-5">
    
    <h1>Hover Focus Active </h1>

     <!-- Hover -->

    <button class="bg-blue-500 text-white font-bold py-2 px-4 rounded hover:bg-blue-700">
        Hover Me
    </button>

    <!-- Focus -->

    <button class="bg-green-500 text-white font-bold py-2 px-4 rounded focus:outline-none focus:ring-4 focus:ring-green-300">
        Focus Me
    </button>

    <!-- Active -->
    <button class="bg-red-500 text-white font-bold py-2 px-4 rounded active:bg-red-700">
        Active Me
    </button>

    <!-- Disabled -->

    <button class="bg-gray-500 text-white font-bold py-2 px-4 rounded opacity-50 cursor-not-allowed" disabled>
        Disabled Me
    </button>

    <!-- Transition and Animation -->
    <button class="bg-purple-500 text-white font-bold py-2 px-4 rounded transform transition duration-300 hover:scale-110 hover:bg-purple-700">
        Animate Me
    </button>
    
 


</body>
</html>
