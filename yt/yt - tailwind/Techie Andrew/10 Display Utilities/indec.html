<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="container p-5 m-5">
   
   <!-- Display Utilities  -->

     <!-- inline -->
      <div class="border p-3">
          <span class="inline border p-2 bg-blue-200">Inline Element 1</span>
          <span class="inline border p-2 bg-blue-400">Inline Element 2</span>
          <span class="inline border p-2 bg-blue-600">Inline Element 3</span>
      </div>
      <br>
      <!-- inline-block -->
      <div class="border p-3">
          <span class="inline-block border p-2 bg-blue-200">Inline Block Element 1</span>
          <span class="inline-block border p-2 bg-blue-400">Inline Block Element 2</span>
          <span class="inline-block border p-2 bg-blue-600">Inline Block Element 3</span>
      </div>
      <br>
      <!-- block -->
      <div class="border p-3">
          <span class="block border p-2 bg-blue-200">Block Element 1</span>
          <span class="block border p-2 bg-blue-400">Block Element 2</span>
          <span class="block border p-2 bg-blue-600">Block Element 3</span>
      </div>

      <!-- hidden -->
      <div class="border p-3">
          <span class="border p-2 bg-blue-200">Visible Element</span>
          <span class="hidden border p-2 bg-blue-400">Hidden Element</span>
          <span class="border p-2 bg-blue-600">Visible Element</span>
      </div>
</body>

</html>
