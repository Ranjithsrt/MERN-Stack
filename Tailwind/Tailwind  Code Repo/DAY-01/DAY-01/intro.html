<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }
      div {
        width: 300px;
        padding: 15px;
        border: 1px solid #ccc;
        margin: 0 auto;
        background-color: azure;
        text-align: center;
      }

      h1 {
        color: blueviolet;
        font-size: 20px;
        margin-bottom: 15px;
      }
      p {
        margin-bottom: 15px;
      }

      a {
        text-decoration: none;
        color: blueviolet;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Tailwind CSS Tutorial</h1>
      <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Deserunt unde at reiciendis eaque excepturi, ipsam impedit odio voluptas fugit placeat vel quod harum? Voluptate culpa repudiandae doloribus molestias a temporibus?</p>
      <a href="#">Read More</a>
    </div>
  </body>
</html>
