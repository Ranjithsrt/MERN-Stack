<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
  </head>
  <body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
    <button id="theme-toggle" class="m-4 px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">Toggle Theme</button>
    <main class="flex justify-center p-4 flex-col gap-10">
      <div class="p-4 bg-blue-50 text-sm rounded-lg text-blue-800 dark:bg-gray-800 dark:text-blue-400">
        <span class="font-medium">Info Alert</span>
        This is a sample alert message
      </div>

      <div class="p-4 bg-red-50 text-sm rounded-lg text-red-800 dark:bg-gray-800 dark:text-red-400">
        <span class="font-medium">Info Alert</span>
        This is a sample alert message
      </div>

      <div class="p-4 bg-yellow-50 text-sm rounded-lg text-yellow-800 dark:bg-gray-800 dark:text-yellow-400">
        <span class="font-medium">Info Alert</span>
        This is a sample alert message
      </div>

      <div class="p-4 bg-gray-50 text-sm rounded-lg text-gray-800 dark:bg-gray-800 dark:text-gray-400">
        <span class="font-medium">Info Alert</span>
        This is a sample alert message
      </div>
    </main>

    <script>
      const toggleButton = document.getElementById("theme-toggle");
      const htmlElement = document.documentElement;

      // Load theme from localStorage
      if (localStorage.getItem("theme") === "dark") {
        htmlElement.classList.add("dark");
      }

      toggleButton.addEventListener("click", () => {
        htmlElement.classList.toggle("dark");
        const isDark = htmlElement.classList.contains("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
      });
    </script>
  </body>
</html>
