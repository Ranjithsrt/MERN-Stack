<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=shield_lock" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="min-h-screen bg-[#f8f9fc] text-slate-700 selection:bg-indigo-100 selection:text-indigo-900 flex">
      <aside class="w-64 bg-white border-[#eef0f7] border-r sticky top-0 h-screen py-8 flex flex-col">
        <!--Logo Start-->
        <div class="px-8 flex items-center space-x-3 mb-10">
          <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-100">
            <div class="w-4.5 h-4.5 bg-white rounded-full flex items-center justify-center"><div class="w-2 h-2 bg-indigo-600 rounded-sm"></div></div>
          </div>
          <h1 class="text-lg font-bold tracking-tight text-slate-800">Super Bank</h1>
        </div>

        <!--Logo End-->
        <!-- Nav Start -->
        <div class="px-4 mb-6">
          <p class="px-5 text-[10px] font-bold text-slate-300 uppercase tracking-widest mb-4">nav</p>
          <nav class="space-y-1">
            <a href="#" class="flex items-center space-x-3.5 px-5 py-3 bg-indigo-50 text-indigo-600 transition-all duration-300">
              <div class="p-1.5 bg-indigo-600 text-white rounded-md shadow-sm shadow-indigo-100">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-layout-dashboard"
                  aria-hidden="true"
                >
                  <rect width="7" height="9" x="3" y="3" rx="1"></rect>
                  <rect width="7" height="5" x="14" y="3" rx="1"></rect>
                  <rect width="7" height="9" x="14" y="12" rx="1"></rect>
                  <rect width="7" height="5" x="3" y="16" rx="1"></rect>
                </svg>
              </div>
              <span class="font-semibold text-sm text-indigo-600">Dashboard</span>
            </a>

            <a href="#" class="flex items-center space-x-3.5 px-5 py-3 hover:bg-slate-100 text-slate-500 transition-all duration-300 hover:text-slate-800">
              <div class="p-1.5 e rounded-md">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-history" aria-hidden="true">
                  <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                  <path d="M3 3v5h5"></path>
                  <path d="M12 7v5l4 2"></path>
                </svg>
              </div>
              <span class="font-semibold text-sm">Transactions</span>
            </a>
            <a href="#" class="flex items-center space-x-3.5 px-5 py-3 hover:bg-slate-100 text-slate-500 transition-all duration-300 hover:text-slate-800">
              <div class="p-1.5 e rounded-md">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-circle-arrow-up"
                  aria-hidden="true"
                >
                  <circle cx="12" cy="12" r="10"></circle>
                  <path d="m16 12-4-4-4 4"></path>
                  <path d="M12 16V8"></path>
                </svg>
              </div>
              <span class="font-semibold text-sm">Deposit</span>
            </a>
            <a href="#" class="flex items-center space-x-3.5 px-5 py-3 hover:bg-slate-100 text-slate-500 transition-all duration-300 hover:text-slate-800">
              <div class="p-1.5 e rounded-md">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-circle-arrow-down"
                  aria-hidden="true"
                >
                  <circle cx="12" cy="12" r="10"></circle>
                  <path d="M12 8v8"></path>
                  <path d="m8 12 4 4 4-4"></path>
                </svg>
              </div>
              <span class="font-semibold text-sm">Withdraw</span>
            </a>
          </nav>
        </div>
        <!-- Nav End -->
        <!-- Support Start-->
        <div class="px-4 mt-auto">
          <div class="p-5 bg-slate-50 text-slate-400 border border-slate-100 rounded-xl">
            <div class="relative z-10 text-center">
              <div class="w-8 h-8 bg-white text-indigo-600 flex items-center justify-center border border-slate-100 mx-auto shadow-sm rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings" aria-hidden="true">
                  <path
                    d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"
                  ></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </div>
              <p class="text-xs font-bold text-slate-800 mb-1">Support Hub</p>
              <button class="text-[10px] w-full font-bold text-slate-800 border border-slate-200 py-2 mt-2 transition-all hover:border-indigo-200 rounded-lg">Get Help</button>
            </div>
          </div>
        </div>
        <!-- Support End-->

        <!--sign out Start-->
        <div class="px-8 mt-6">
          <button class="flex items-center gap-2 text-slate-400 hover:text-rose-500 transition-all font-bold text-[12px] uppercase tracking-tighter">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-log-out" aria-hidden="true">
              <path d="m16 17 5-5-5-5"></path>
              <path d="M21 12H9"></path>
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            </svg>
            <span>Sign Out</span>
          </button>
        </div>
        <!--sign out End-->
      </aside>
      <div class="flex-1 flex flex-col">
        <header class="h-20 bg-white border-b border-[#eef0f7] px-8 flex items-center justify-between sticky top-0 z-20">
          <div class="relative max-w-sm w-full">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-search absolute left-4 top-1/2 -translate-y-1/2"
              aria-hidden="true"
            >
              <path d="m21 21-4.34-4.34"></path>
              <circle cx="11" cy="11" r="8"></circle>
            </svg>
            <input
              type="text"
              class="w-full bg-[#f8fafc] border border-slate-100 rounded-lg pl-12 pr-4 py-2 text-sm font-medium focus:outline-none focus:bg-white focus:border-indigo-100 placeholder:text-slate-300 focus:bg-white"
              placeholder="Search"
            />
          </div>

          <div class="flex items-center space-x-6">
            <div class="flex items-center space-x-5 border-r border-slate-100 pr-6 text-slate-300">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-bell cursor-pointer hover:text-slate-600 transition-colors"
                aria-hidden="true"
              >
                <path d="M10.268 21a2 2 0 0 0 3.464 0"></path>
                <path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"></path>
              </svg>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-wallet cursor-pointer hover:text-slate-600 transition-colors"
                aria-hidden="true"
              >
                <path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"></path>
                <path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"></path>
              </svg>
            </div>
            <div class="flex items-center space-x-3">
              <div class="text-right">
                <p class="text-sm font-bold text-slate-800 leading-none">Tivin</p>
                <p class="text-[9px] font-bold text-slate-300 uppercase tracking-widest mt-1">Admin</p>
              </div>
            </div>
            <div class="w-9 h-9 overflow-hidden rounded-lg border border-slate-100 shadow-sm">
              <img src="https://ui-avatars.com/api/?name=Tivin&background=6366f1&color=fff&size=80&bold=true" alt="" />
            </div>
          </div>
        </header>
        <main>Main</main>
      </div>
    </div>
  </body>
</html>
