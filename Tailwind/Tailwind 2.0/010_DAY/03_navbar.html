<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=stacks" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet" />

    <title>Navbar</title>
    <style>
      .icon-large {
        font-size: 32px;
      }
    </style>
    <style type="text/tailwindcss">
      @import "tailwindcss";
      @theme {
        --font-body: "Poppins", sans-serif;
        --tracking-brand: 0.05rem;
      }
    </style>
  </head>
  <body class="bg-slate-100 font-body">
    <nav class="flex items-center justify-between p-5 bg-white shadow-sm">
      <a href="#" class="uppercase flex gap-2 text-3xl items-center font-bold tracking-brand">
        <span class="material-symbols-outlined icon-large"> stacks </span>
        Stacks
      </a>

      <div class="flex gap-6">
        <a href="#" class="font-medium hover:underline text-gray-600 hover:text-blue-600">Home</a>
        <a href="#" class="font-medium hover:underline text-gray-600 hover:text-blue-600">About</a>
        <a href="#" class="font-medium hover:underline text-gray-600 hover:text-blue-600">Contact</a>
      </div>

      <button class="bg-blue-600 text-white px-4 py-2 rounded">Get Started</button>
    </nav>

    <main class="max-w-6xl mx-auto p-3 mt-5">
      <div class="max-w-sm overflow-hidden bg-white rounded shadow-lg hover:shadow-2xl transition-all duration-300 hover:-translate-y-2">
        <div class="w-full h-48 relative">
          <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&q=80&w=800" alt="" class="w-full h-full object-cover" />
          <span class="absolute top-4 text-white left-4 bg-blue-600 px-3 py-1 rounded text-xs font-semibold">New Release</span>
        </div>
        <div class="p-6">
          <div class="flex justify-between mb-2 items-center">
            <h3 class="text-xl font-bold text-gray-900">Full Stack Course</h3>
            <span class="text-lg font-bold text-blue-600"> ₹ 35000 </span>
          </div>

          <p class="mb-6 text-sm leading-relaxed text-gray-600">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Voluptatum laborum error sit odio perspiciatis pariatur?</p>

          <button class="py-3 bg-blue-600 text-white px-3 font-semibold hover:bg-blue-800 transition-colors">View Details</button>
        </div>
      </div>
    </main>
  </body>
</html>
