      @theme {

        --color-text-subtle: #b89d9f;

        /* Font Families */
        --font-display: "Plus Jakarta Sans", sans-serif;

        --radius: 0.25rem; /* becomes the new DEFAULT */
        --radius-lg: 0.5rem;
        --radius-xl: 0.75rem;

        /* Optional: if you want rounded-none, sm, md, 2xl, 3xl to stay the same as Tailwind defaults */

        --radius-sm: 0.125rem;
        --radius-md: 0.375rem;
        --radius-2xl: 1rem;
        --radius-3xl: 1.5rem;
      }

      }
      .fade-in {

        from {

          transform: translateY(10px);
        }
        to {

        }
