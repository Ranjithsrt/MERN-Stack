<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Colors in tailwindcss</title>
    <style>
      body {
        padding: 50px;
      }
    </style>
  </head>
  <body>
    <h1 class="text-center uppercase font-semibold tracking-wider">Margin & Padding</h1>
    <!--  
    m -> Margin
    p -> Padding

    0-> 0px
    1 -> 0.25rem 4px
    2 -> 0.5rem  8px
    4 -> 1rem    16px
    6 -> 1.5rem  24px
    8 -> 2rem    32px
    12 -> 3rem   48px
    16 -> 4rem   64px
    p-<value>  => p-4   all side  16px  
    py-<value> => py-4  top & Bottom 16px
    px-<value> => px-4  left & Right 16px
    pt-<value> => pt-4  top
    pb-<value> => pb-4  bottom
    pr-<value> => pr-4  right
    pe-<value> => pe-4  end
    pl-<value> => pl-4  left
    ps-<value> => ps-4  start
-->
    <div class="bg-emerald-900 text-white p-4 m-4">Tutor Joe's</div>
  </body>
</html>
