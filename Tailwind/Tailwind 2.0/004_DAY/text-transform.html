<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Colors in tailwindcss</title>
    <style>
      body {
        padding: 50px;
      }
      :root {
        --my-color: brown;
        --mydecoration: 10px;
      }

      p {
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <h1 class="text-center uppercase font-semibold tracking-wider">text transform</h1>

    <p class="uppercase">this is a sample text</p>
    <p class="lowercase">THIS IS A sample TEXT</p>
    <p class="capitalize">this is a sample text</p>
    <p class="normal-case">this is a sample text</p>
    <p class="capitalize md:uppercase">this is a sample text</p>
  </body>
</html>
