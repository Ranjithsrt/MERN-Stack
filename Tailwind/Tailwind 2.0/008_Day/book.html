<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>The Grand Heritage | Luxury Hotel in India</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap" rel="stylesheet" />
    <style>
      @theme {
        --font-play: "Playfair", serif;
        --color-gold: #d4af37;
      }
    </style>
  </head>
  <body>
    <nav class="fixed w-full px-6 md:px-12 py-5 bg-black/80 text-white flex items-center justify-between z-50">
      <div class="uppercase font-bold text-xl tracking-widest font-play">Grand Heritage</div>
      <div class="hidden lg:flex gap-8 text-[11px] tracking-widest font-medium">
        <a href="#" class="hover:text-yellow-700 transition-colors">About Us</a>
        <a href="#" class="hover:text-yellow-700 transition-colors">Rooms</a>
        <a href="#" class="hover:text-yellow-700 transition-colors">Services</a>
        <a href="#" class="hover:text-yellow-700 transition-colors">Contact</a>
      </div>
      <button class="bg-transparent px-6 py-2 uppercase tracking-widest font-bold hover:bg-yellow-700 hover:text-white transition-all">Book Now</button>
    </nav>
    <section class="h-screen w-full relative flex items-center justify-center">
      <div class="absolute inset-0">
        <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1920&q=80" alt="Main Hotel View" class="w-full h-full object-cover" />
        <div class="absolute inset-0 bg-black/40"></div>
      </div>
      <div class="relative text-center text-white px-4 space-y-6">
        <span class="text-sm uppercase tracking-widest font-light">Welcome to Premium Comfort</span>
        <h1 class="text-5xl md:text-8xl font-serif">
          A Beautiful<br />
          Stay Awaits
        </h1>
        <p class="text-lg md:text-xl font-light max-w-xl mx-auto opacity-90">Experience the best Inidian hospitality and moredrn luxury in a peaceful setting.</p>
      </div>

      <div class="absolute bottom-10 w-full px-4">
        <div class="bg-white max-w-5xl mx-auto p-6 shadow-xl flex flex-wrap lg:flex-nowrap items-end rounded-sm gap-6">
          <div class="flex-1 min-w-[150px]">
            <label for="cin" class="block text-[10px] uppercase text-gray-400 mb-2">Check-In</label>
            <input type="date" id="cin" class="w-full border-b focus:outline-none border-gray-200 pb-2 focus:border-yellow-600" />
          </div>
          <div class="flex-1 min-w-[150px]">
            <label for="cout" class="block text-[10px] uppercase text-gray-400 mb-2">Check-Out</label>
            <input type="date" id="cout" class="w-full border-b focus:outline-none border-gray-200 pb-2 focus:border-yellow-600" />
          </div>
          <div class="flex-1 min-w-[150px]">
            <label for="guest" class="block text-[10px] uppercase text-gray-400 mb-2">Guest</label>
            <select class="w-full border-b border-gray-200 pb-2">
              <option>1 Adult</option>
              <option selected>2 Adults</option>
              <option>Family (2+2)</option>
            </select>
          </div>
          <button class="bg-gray-900 w-full lg:w-auto text-wrap px-10 py-4 uppercase text-white font-bold tracking-widest hover:bg-yellow-700 transition-all">Search Rooms</button>
        </div>
      </div>
    </section>
  </body>
</html>
