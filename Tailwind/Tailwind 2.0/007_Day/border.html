    <div class="w-[150px] h-[150px] m-3 bg-pink-700 text-white text-center leading-[150px] border-10 border-e-orange-500 border-double">border</div>

    <div class="bg-white flex flex-col divide-y-5 divide-emerald-500">
      <p class="p-4">Item-1</p>
      <p class="p-4">Item-2</p>
      <p class="p-4">Item-3</p>
    </div>

    <div class="bg-white flex divide-x-5 divide-emerald-500 divide-dashed">
      <p class="p-4">Item-1</p>
      <p class="p-4">Item-2</p>
      <p class="p-4">Item-3</p>
    </div>

    <div class="bg-white mt-3 p-3">
      <div class="my-20 flex p-1 w-[300px] items-center gap-3">
        <label for="email" class="font-semibold">Email</label>
        <input class="flex-1 p-3 outline-none border border-slate-300 rounded focus:border-blue-500" type="email" id="email" placeholder="sample@gmail.com" />
      </div>
    </div>

    <div class="bg-white mt-3 p-3">
      <div class="my-20 flex p-1 w-[300px] items-center gap-3">

    </div>
