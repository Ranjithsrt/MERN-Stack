<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Image Slider</title>
  </head>

  <body>
    <section class="container mx-auto my-5">
      <div class="relative">
        <ul id="slider">
          <li class="h-[50vh]">
            <img
              src="https://picsum.photos/id/1015/400/250"
              class="w-full h-full object-cover rounded-md"
            />
            <div
              class="absolute top-0 left-0 w-full h-full flex flex-col justify-center items-center"
            >
              <h2 class="text-4xl font-bold text-white">Image 1</h2>
            </div>
          </li>
          <li class="h-[50vh] hidden">
            <img
              src="https://picsum.photos/id/1016/400/250"
              class="w-full h-full object-cover rounded-md"
            />
            <div
              class="absolute top-0 left-0 w-full h-full flex flex-col justify-center items-center"
            >
              <h2 class="text-4xl font-bold text-white">Image 2</h2>
            </div>
          </li>
          <li class="h-[50vh] hidden">
            <img
              src="https://picsum.photos/id/1018/400/250"
              class="w-full h-full object-cover rounded-md"
            />
            <div
              class="absolute top-0 left-0 w-full h-full flex flex-col justify-center items-center"
            >
              <h2 class="text-4xl font-bold text-white">Image 3</h2>
            </div>
          </li>
        </ul>

        <!-- Navigation buttons -->
        <div class="flex absolute top-0 left-0 w-full h-full">
          <div class="my-auto w-full flex justify-between">
            <button
              class="bg-white/50 rounded-full p-2 w-10 ml-5 shadow-lg"
              onclick="prev()"
            >
              &lt;
            </button>
            <button
              class="bg-white/50 rounded-full p-2 w-10 mr-5 shadow-lg"
              onclick="next()"
            >
              &gt;
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- JavaScript -->
    <script>
      let currentSlideID = 0;
      const sliderElement = document.getElementById("slider");
      const slides = sliderElement.getElementsByTagName("li");
      const totalSlides = slides.length;

      function showSlide() {
        for (let i = 0; i < totalSlides; i++) {
          slides[i].classList.add("hidden");
        }
        slides[currentSlideID].classList.remove("hidden");
      }

      function next() {
        currentSlideID = (currentSlideID + 1) % totalSlides;
        showSlide();
      }

      function prev() {
        currentSlideID = (currentSlideID - 1 + totalSlides) % totalSlides;
        showSlide();
      }
    </script>
  </body>
</html>
