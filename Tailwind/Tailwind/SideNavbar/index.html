<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="bg-red-300">
      <div class="container lg:flex items-center mx-auto px-5 py-2">
        <div class="flex justify-between">
          <!-- Logo -->
          <a href="#">
            <!-- <img
              src="https://th.bing.com/th/id/OIP.0YTpKnoOe8nPUxK1E0qkNQHaHa?w=195&h=195&c=7&r=0&o=5&dpr=1.3&pid=1.7"
              alt="Logo"
              class="h-14"
            /> -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"

              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-10 h-14 text-red-700"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 7.74-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm0 0v-3.675A55.378 55.378 0 0 1 12 8.443m-7.007 11.55A5.981 5.981 0 0 0 6.75 15.75v-1.5"
              />
            </svg>
          </a>

          <!-- Hamburger menu -->
          <button
            onclick="toggleMenu()"
            class="lg:hidden px-4 py-4 rounded:md bg-red-600 text-white"
          >
            Menu
          </button>
        </div>

        <!-- Navigation links -->
        <div id="menu" class="ml-auto mt-5 lg:mt-0 hidden lg:block">
          <ul class="lg:flex">
            <li
              class="mx-1 px-6 py-2 bg-red-600 text-white hover:bg-red-500 cursor-pointer"
            >
              <a href="#">Home</a>
            </li>
            <li class="mx-1 px-6 py-2 hover:bg-red-400 cursor-pointer">
              <a href="#">About</a>
            </li>
            <li class="mx-1 px-6 py-2 hover:bg-red-400 cursor-pointer">
              <a href="#">Contact</a>
            </li>
            <li
              class="mx-1 px-6 py-2 hover:bg-red-400 cursor-pointer relative group"
            >
              <a href="#" class="group-hover:text-white">Services</a>
              <ul
                class="lg:absolute bg-green-300 top-10 left-0 lg:hidden group-hover:block lg:w-56"
              >
                <li class="my-1 px-6 py-2 hover:bg-red-400 cursor-pointer">
                  <a href="#">Service 1</a>
                </li>
                <li class="my-1 px-6 py-2 hover:bg-red-400 cursor-pointer">
                  <a href="#">Service 2</a>
                </li>
                <li class="my-1 px-6 py-2 hover:bg-red-400 cursor-pointer">
                  <a href="#">Service 3</a>
                </li>
              </ul>
            </li>
            <li
              class="mx-1 px-6 py-2 hover:bg-red-400 cursor-pointer relative group"
            >
              <a href="#" class="group-hover:text-white">Blog</a>
              <ul
                class="lg:absolute bg-green-300 top-10 right-0 lg:hidden group-hover:block lg:w-56"
              >
                <li class="my-1 px-6 py-2 hover:bg-red-400 cursor-pointer">
                  <a href="#">Service 1</a>
                </li>
                <li class="my-1 px-6 py-2 hover:bg-red-400 cursor-pointer">
                  <a href="#">Service 2</a>
                </li>
                <li class="my-1 px-6 py-2 hover:bg-red-400 cursor-pointer">
                  <a href="#">Service 3</a>
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- Javascript -->
    <script>
      function toggleMenu() {
        const menu = document.getElementById("menu");
        console.log(menu.classList);
        if (menu.classList.contains("hidden")) {
          menu.classList.remove("hidden");
        } else {
          menu.classList.add("hidden");
        }
      }
    </script>
  </body>
</html>
