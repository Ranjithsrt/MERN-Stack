<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Button Hover Animations</title>
    <style>
      body {
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction:center;
        align-items: center;
        /* flex-direction: column;
        align-items: center; */
        gap: 20px;
        padding: 50px;
        height:500px;
      }

      .fill-button {
        position: relative;
        padding: 12px 24px;
        font-size: 16px;
        color: white;
        background: transparent;
        border: 2px solid red;
        cursor: pointer;
        overflow: hidden;
        z-index: 1;
        transition: color 0.4s ease;
      }

      .fill-button::before {
        content: "";
        position: absolute;
        background: red;
        z-index: -1;
        transition: all 0.4s ease;
      }

      /* Bottom to Top */
      .bottom-to-top::before {
        bottom: 0;
        left: 0;
        width: 100%;
        height: 0;
      }

      .bottom-to-top:hover::before {
        height: 100%;
      }

      /* Top to Bottom */
      .top-to-bottom::before {
        top: 0;
        left: 0;
        width: 100%;
        height: 0;
      }

      .top-to-bottom:hover::before {
        height: 100%;
      }

      /* Left to Right */
      .left-to-right::before {
        top: 0;
        left: 0;
        width: 0;
        height: 100%;
      }

      .left-to-right:hover::before {
        width: 100%;
      }

      /* Right to Left */
      .right-to-left::before {
        top: 0;
        right: 0;
        width: 0;
        height: 100%;
      }

      .right-to-left:hover::before {
        width: 100%;
      }

      .fill-button:hover {
        color: white;
      }
    </style>
  </head>
  <body>
    <button class="fill-button bottom-to-top">Bottom to Top</button>
    <button class="fill-button top-to-bottom">Top to Bottom</button>
    <button class="fill-button left-to-right">Left to Right</button>
    <button class="fill-button right-to-left">Right to Left</button>

    <button class="fill-button">Button</button>
    <button class="fill-button">Button</button>
    <button class="fill-button">Button</button>
    <button class="fill-button">Button</button>
  </body>
</html>
