<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calender</title>
    <link rel="stylesheet" href="./style.css" />

   
  </head>
  <body>
    <table border="0">
      <tr>
        <th colspan="7" align="start" class="date">

        </th>
      </tr>
      <tr>
        <td colspan="5">
          <span class="month">September 2027</span>
          <td> 
            <span class="arrow-up">&#9650;</span> 
          </td>

           <td> 
            <span class="arrow-up">&#9660;</span> 
          </td>
          

 
        </td>
      </tr>
      <tr>
            <td><div class="day">Sun</div></td>
            <td><div class="day">Mon</div></td> 
            <td><div class="day">Tue</div></td> 
            <td><div class="day">Wed</div></td>
            <td><div class="day">Thu</div></td>
            <td><div class="day">Fri</div></td> 
            <td><div class="day">Sat</div></td>
      </tr>
      <tr>
        <td>1</td>  
        <td>2</td>
        <td>3</td>
        <td>4</td>
        <td><div class="Day-five">5</div></td>
         <td>6</td>
        <td>7</td>
      </tr>
      <tr>
        <td>8</td>  
        <td>9</td>
        <td>10</td>
        <td>11</td>
        <td>12</td>
        <td>13</td>
        <td>14</td>
      </tr>
      <tr>
        <td>15</td>  
        <td>16</td>
        <td>17</td>
        <td><div class="today">18</div></td>
        <td>19</td>
        <td>20</td>
        <td>21</td>
      </tr>
      <tr>
        <td>21</td>  
        <td>22</td>
        <td>23</td>
        <td>24</td>
        <td>25</td>
        <td>26</td>
        <td>27</td>

      <tr>
        <td>28</td>

        <td>30</td>
        <td>31</td>
        <td class="date-opacity">1</td>
        <td class="date-opacity">2</td>
        <td class="date-opacity">3</td>
      </tr>

      <tr class="date-opacity">
        <td>4</td>

        <td>6</td>
        <td>7</td>
        <td>8</td>
        <td>9</td>
        <td>10</td>
      </tr>

      <tr class="footer">
        <td colspan="1">
          <span class="mins-left">-</span>
         
        </td>
        <td>30 Mins</td>
        <td>
           <span class="plus-right">+</span>
        </td>

        <td colspan="4" align="end">
          <span class="arrow-right">&#9654;  <b>Focus</b></span> 
         </td>
      </tr>
    </table>
  </body>
</html>
