<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NavBar</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: orangered;
            --secondary-color: white;
            --bg-color: #333;
        }

        /* Navbar */

        nav {
            width: 100%;
            height: 100px;
            background-color: var(--bg-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        /* Logo */

        .logo>a {
            color: orangered;
            font-weight: bolder;
            font-size: 20px;
            text-transform: uppercase;
        }

        .logo >a:hover {
            color: rgba(255, 69, 2, 0.823);
            transition: all 0.5s ease-in-out;
            /* background-color: yellow; */

        }

        a {
            color: var(--secondary-color);
            text-decoration: none;
            font-size: bolder;
            font-weight: 550;
        }

        /* Nav Links */

        .nav-links {
            display: flex;
            gap: 20px;
        }

        /* Button */

        button {
            background-color: var(--primary-color);
            padding: 10px;
            border: none;
            outline: none;
            border-radius: 5px;
            color: white;
        }

        .nav-links>span>a:hover {
            color: orangered;
            transition: all 0.3s ease-in-out;
        }

        button:hover {
            background-color: #333;
            transition: 1s all;
        }
    </style>
</head>

<body>
    <section>
        <nav>
            <span class="logo"><a href="#">Tutor Joe's</a></span>
            <div class="nav-links">
                <span><a href="#">Home</a></span>
                <span><a href="#">Products</a></span>
                <span><a href="#">About us</a></span>
                <span><a href="#">Download</a></span>
            </div>
            <button>call us</button>
        </nav>
    </section>
</body>

</html>
