<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        writing-mode: vertical-rl;
        border: 1px solid #333;
        height: 120px;
        margin: 10px;
        padding: 10px;
      }

      .mixed {
        text-orientation: mixed;
      }
      .upright {
        text-orientation: upright;
      }
      .sideways {
        text-orientation: sideways;
      }
    </style>
  </head>
  <body>
    <div class="mixed">Mixed Orientation 漢字 ABC</div>
    <div class="upright">Upright Orientation 漢字 ABC</div>
    <div class="sideways">Sideways Orientation 漢字 ABC</div>
  </body>
</html>
