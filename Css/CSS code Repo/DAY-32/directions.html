<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      div {
        border: 1px solid #000;
        padding: 10px;
        margin-bottom: 10px;
      }
      .ltr {
        direction: ltr;
      }
      .rtl {
        direction: rtl;
      }

    </style>
  </head>
  <body>
    <div class="ltr">What is apple and where is from?</div>
    <div class="rtl">ما هي التفاحة ومن أين أتت؟</div>

  </body>
</html>
