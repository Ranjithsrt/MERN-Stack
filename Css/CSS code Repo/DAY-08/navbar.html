<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      nav {
        background-color: #333;
        display: flex;
        flex-direction: column;
      }
      a {
        text-decoration: none;
        color: inherit;
        display: block;
        padding: 10px 20px;
        color: #fff;
      }
      a:hover {
        background-color: #263;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">Download</a>
      <a href="#">Contact Us</a>
      <a href="#">About Us</a>
    </nav>
  </body>
</html>
