      div {
        box-sizing: border-box;
        width: 100px;
        height: 100px;
        padding: 20px;
        border: 10px solid black;
        background-color: lightblue;
      }
    </style>
  </head>
  <body>
    <h2>Box Sizing : content-box | border-box</h2>

    <div>content box</div>
  </body>
</html>
