<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <h3>Sign Up</h3>
      <form action="#" autocomplete="off">
        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" placeholder="Enter Full Name" />
        </div>
        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender">
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter Username" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter Email" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter Password" />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Enter Confirm Password" />
        </div>

        <div class="form-group">
          <label for="pic">Profile Image</label>
          <input type="file" id="pic" accept="image/*" />
        </div>

        <div class="agree">
          <label for="agree">
            <input type="checkbox" id="agree" />
            I agree <a href="#">Terms &amp; Condition</a>
          </label>
        </div>
        <button>Login</button>
      </form>
      <p>Already have an account? <a href="login.html">Sign In</a> Now</p>
    </div>
  </body>
</html>
