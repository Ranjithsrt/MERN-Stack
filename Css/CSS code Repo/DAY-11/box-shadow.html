<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Shadow</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #box {
        width: 200px;
        height: 200px;
        background-color: orangered;
        border-radius: 15px;
        box-shadow: rgba(0, 0, 0, 0.56) 0px 22px 70px 4px;
        transition: 0.5s;
        cursor: pointer;
      }
      #box:hover {
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body>
    <div id="box"></div>
  </body>
</html>
