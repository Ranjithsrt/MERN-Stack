<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;900&display=swap");

      * {
        margin: 0;
        padding: 0;
        font-family: "Rubik", sans-serif;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        display: grid;

        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: 50px 200px 1fr 200px 50px;

        grid-template-areas:
          "navbar navbar navbar"
          "header header header"
          "sidebar main  main"
          "section1 section2 section3"
          "footer footer footer";
      }

      #navbar,
      #header,
      #sidebar,
      #main,
      #section1,
      #section2,
      #section3,
      #footer {
        background-color: orangered;
        color: white;
        padding: 20px;
        border: 1px solid white;
      }
      #navbar {
        grid-area: navbar;
      }
      #header {
        grid-area: header;
      }
      #sidebar {
        grid-area: sidebar;
      }
      #main {
        grid-area: main;
      }
      #section1 {
        grid-area: section1;
      }
      #section2 {
        grid-area: section2;
      }
      #section3 {
        grid-area: section3;
      }
      #footer {
        grid-area: footer;
      }
    </style>
  </head>
  <body>
    <div id="navbar">Navigation</div>
    <div id="header">Header</div>
    <div id="sidebar">Sidebar</div>
    <div id="main">Main Content</div>
    <div id="section1">Section</div>
    <div id="section2">Section</div>
    <div id="section3">Section</div>
    <div id="footer">Footer</div>
  </body>
</html>
