<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Before & After in CSS</title>
    <style>
      .red-box {
        width: 150px;
        height: 150px;
        border: 3px solid #333;
        background-color: red;
        border-radius: 50%;
        position: relative;
      }
      /* .yellow-box { */
      .red-box::before {
        content: "";
        width: 110px;
        height: 110px;
        background-color: yellow;
        border-radius: 50%;

        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      h4 {
        font-size: 100px;
      }
      h4::before {
        content: " | ";
      }
      h4::after {
        content: " | ";
      }
    </style>
  </head>
  <body>
    <h3>::before and ::after pseudo element</h3>
    <div class="red-box">
      <!-- <div class="yellow-box"></div> -->
    </div>

    <h4>Tutor Joes <ion-icon name="logo-youtube"></ion-icon></h4>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </body>
</html>
