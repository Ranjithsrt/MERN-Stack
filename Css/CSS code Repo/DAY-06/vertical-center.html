<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      section {
        height: 500px;
        border: 1px dashed #000;
        position: relative;
        cursor: pointer;
      }
      .box {
        width: 100px;
        height: 100px;
        background-color: lightblue;
        border: 2px solid #333;
        text-align: center;
        line-height: 100px;

        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <section>
      <div class="box">Box</div>
    </section>
  </body>
</html>
