<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .float-example {
        background-color: lightgreen;
      }
      .float-example img {
        float: left;
        margin-right: 10px;
      }

      .box {
        width: 100px;
        height: 100px;
        background-color: lightcoral;
        text-align: center;
        line-height: 100px;
        position: absolute;
        clear: both;
      }
    </style>
  </head>
  <body>
    <section>
      <h3>float and clear</h3>
      <div class="float-example">
        <img src="https://placehold.co/100" alt="Placeholder" />
        <p>This text wraps around the floated image. Lorem ipsum dolor sit amet, consectetur adipiscing elit</p>
      </div>
      <div class="box">Cleared Box</div>
    </section>
  </body>
</html>
