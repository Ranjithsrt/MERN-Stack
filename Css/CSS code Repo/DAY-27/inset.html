<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        position: relative;
        height: 200px;
        background-color: #b33771;
      }

      .box {
        position: absolute;
        background-color: #55e6c1;
        top: 5px;
        right: 10px;
        bottom: 15px;
        left: 30px;

        inset: 5px 10px 15px 30px; /* T R B L */
        inset: 20px 40px; /* TB LR*/
        inset: 20px 0 40px; /* T RL B */
        inset: 50px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box"></div>
    </div>
  </body>
</html>
