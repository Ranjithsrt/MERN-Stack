<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");

      * {
        font-family: "Inter", sans-serif;
      }
      .section {
        background-color: #2c3a47;
        height: 300px;
        display: grid;
        place-items: center;
      }
      span {
        color: #fff;
        background: linear-gradient(to bottom right, #182c61, #fc427b);
        padding: 10px 20px;
        border-radius: 30px;
        font-size: 28px;
        font-weight: 600;
        line-height: 65px;

        box-decoration-break: slice;
        box-decoration-break: clone;
      }
    </style>
  </head>
  <body>
    <div class="section">
      <div class="container">
        <span
          >Tutor Joe's <br />
          Software Solution <br />Salem</span
        >
      </div>
    </div>
  </body>
</html>
