<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: purple;
      }
      table {
        background-color: #f9f9f9;
        border-spacing: 15px;
        border-spacing: 20px 10px; /* 20px horizontal, 10px vertical */
        border-spacing: 0px;
      }
      td,
      th {
        border: 1px solid #333;
        padding: 10px;
        background-color: white;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th>Name</th>
        <th>Age</th>
      </tr>
      <tr>
        <td>John</td>
        <td>30</td>
      </tr>
      <tr>
        <td>Jane</td>
        <td>25</td>
      </tr>
    </table>
  </body>
</html>
