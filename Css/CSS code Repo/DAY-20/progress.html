<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", serif;
      }
      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #333;
      }
      .container {
        background-color: rgba(0, 0, 0, 0.2);
        max-width: 250px;
        width: 100%;
        height: 120px;
        border-radius: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
      }
      .box {
        display: flex;
        height: 100%;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 5px;
      }
      h2 {
        color: #fff;
        font-weight: 400;
      }
      .progress-bar {
        width: 100%;
        max-width: 200px;
        height: 20px;
        border: 2px solid #dadada;
        border-radius: 20px;
        overflow: hidden;
      }
      .progress {
        width: 100%;
        max-width: 0%;
        background-color: #fff;
        height: 20px;
        animation: progress 5s infinite;
      }

      @keyframes progress {
        0% {
          max-width: 0%;
        }
        20% {
          max-width: 20%;
        }
        90% {
          max-width: 50%;
        }
        93% {
          max-width: 80%;
        }
        100% {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">
        <h2>Loading....</h2>
        <div class="progress-bar">
          <div class="progress">
            <div class="ball"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
