<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      @counter-style emoji {
        system: cyclic;
        symbols: 💁 👌 🎍 😍;
        suffix: " ";
      }
      ul {
        list-style: emoji;
      }
    </style>
  </head>
  <body>
    <ul>
      <li>Apple</li>
      <li>Orange</li>
      <li>Banana</li>
      <li>Pineapple</li>
      <li>Mango</li>
      <li>Grapes</li>
    </ul>
  </body>
</html>
