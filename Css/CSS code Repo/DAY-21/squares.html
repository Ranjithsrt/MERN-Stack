<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      /*-------------------------------------------*/

      .rotating-squares {
        width: 60px;
        height: 60px;
        position: relative;
      }

      .rotating-squares:before {
        content: "";
        border: 4px solid #e91e63;
        width: 60px;
        height: 60px;
        position: absolute;
        top: 0;
        left: 0;
        animation: rotate 2s linear infinite;
      }

      .rotating-squares:after {
        content: "";
        border: 4px solid #e91e63;
        width: 30px;
        height: 30px;
        position: absolute;
        top: 15px;
        left: 15px;
        animation: rotate-reverse 2s linear infinite;
      }

      @keyframes rotate {
        0% {
          transform: rotate(0);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes rotate-reverse {
        0% {
          transform: rotate(0);
        }
        100% {
          transform: rotate(-360deg);
        }
      }

      .box {
        height: 15px;
        width: 15px;
        border: 4px solid #e91e63;
        position: absolute;
        top: -10px;
        left: -10px;
        animation: rotate 2s linear infinite;
      }
    </style>
  </head>
  <body>
    <div class="rotating-squares">
      <div class="box"></div>
    </div>
  </body>
</html>
