<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .rotating-square {
        width: 30px;
        height: 30px;
        background-color: #e91e63;
        border-radius: 50%;
        animation: squateToCircle 1.5s ease infinite;
      }

      @keyframes squateToCircle {
        0% {
          transform: scale(1) rotate(0);
        }
        50% {
          transform: scale(2) rotate(-180deg);
          border-radius: 0;
        }
        100% {
          transform: scale(1) rotate(-360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="rotating-square"></div>
  </body>
</html>
