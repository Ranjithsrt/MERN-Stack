<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .clock {
        width: 80px;
        height: 80px;
        border: 3px solid #e91e63;
        border-radius: 50%;
        position: relative;
      }

      .clock::before {
        content: "";
        position: absolute;
        width: 3px;
        height: 20px;
        background-color: #e91e63;
        top: 50%;
        left: 50%;
        transform-origin: 50% 0%;
        animation: rotate 2s linear infinite;
      }

      .clock::after {
        content: "";
        position: absolute;
        width: 3px;
        height: 30px;
        background-color: #e91e63;
        top: 50%;
        left: 50%;
        transform-origin: 50% 0%;
        animation: rotate 0.75s linear infinite;
      }

      @keyframes rotate {
        0% {
          transform: rotate(0);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="clock"></div>
  </body>
</html>
