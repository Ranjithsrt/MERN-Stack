<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      /*-------------------------------------------*/
      .heart {
        width: 60px;
        height: 60px;

        position: relative;
        transform: rotate(45deg);
        animation: pulse 1.5s ease infinite;
      }
      .heart::before {
        content: "";
        position: absolute;
        background-color: #e91e63;
        width: 60px;
        height: 40px;
        left: 0;
        top: 20px;
        border-top-left-radius: 20px;
        border-bottom-left-radius: 20px;
      }
      .heart::after {
        content: "";
        position: absolute;
        background-color: #e91e63;
        width: 40px;
        height: 40px;
        left: 20px;
        top: 0;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: rotate(45deg) scale(0.7);
        }

        50% {
          transform: rotate(45deg) scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="heart"></div>
  </body>
</html>
