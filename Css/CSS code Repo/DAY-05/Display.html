<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      h3 {
        /* block */
        background-color: aqua;
        display: inline;
      }
      ul {
        background-color: aquamarine;
      }
      span {
        /* inline */
        background-color: aquamarine;
        padding: 10px;
        margin: 10px;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <h3>Display and Position Properties</h3>
    <span>Class</span>

    <ul>
      <li>display</li>
      <li>position</li>
    </ul>

    <span>Tutor Joe's</span>
    <span>Salem</span>
    <span>CSS Class</span>
  </body>
</html>
