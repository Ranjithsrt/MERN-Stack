<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transform</title>


    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lobster&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", serif;
      }
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .container {
        width: 500px;
        height: 500px;
        background-color: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        perspective: 1000px;
      }

      .box {
        width: 100px;
        height: 100px;
        background-color: #3498db;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        transition: 0.5s;
      }
      .line {
        width: 100px;
        height: 100px;
        position: absolute;
        border: 2px dashed #000;
      }
      /*-------------------------------------*/

      .container:hover .box {
        transform: matrix(2, 0.5, 0.5, 2, 100, 150);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">Hover Me</div>
      <div class="line"></div>
    </div>

 
  </body>
</html>
