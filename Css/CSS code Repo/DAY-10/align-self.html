<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>align-self</title>
    <style>
      .container {
        background-color: aquamarine;
        display: flex;
        height: 300px;
      }
      .container > div {
        background-color: brown;
        color: #fff;
        width: 100px;
        font-size: 30px;
        text-align: center;
        line-height: 75px;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <h3>align-self</h3>
    <div class="container">
      <div style="align-self: flex-end">1</div>
      <div>2</div>
      <div style="align-self: flex-start">3</div>
      <div>4</div>
      <div style="align-self: center">5</div>
    </div>
  </body>
</html>
