<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flex</title>
    <style>
      .container {
        background-color: aquamarine;
        display: flex;
      }
      .container > div {
        background-color: brown;
        color: #fff;
        width: 100px;
        font-size: 30px;
        text-align: center;
        line-height: 75px;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <h3>flex</h3>
    <!--
flex: flex-grow flex-shrink flex-basic;    
-->
    <div class="container">
      <div>1</div>
      <div>2</div>
      <div style="flex: 0 0 200px">3</div>
      <div>4</div>
      <div style="flex: 1">5</div>
    </div>
  </body>
</html>
