<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex-Grow</title>
    <style>
      .container {
        background-color: aquamarine;
        display: flex;
        margin-bottom: 20px;
        align-items: stretch;
        width: 500px;
      }
      .container > div {
        background-color: brown;
        color: #fff;
        font-size: 30px;
        text-align: center;
        line-height: 75px;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <h3>flex-grow</h3>
    <div class="container">
      <div style="flex-grow: 1">1</div>
      <div style="flex-grow: 1">2</div>
      <div style="flex-grow: 2">3</div>
      <div style="flex-grow: 1">4</div>
    </div>
  </body>
</html>
