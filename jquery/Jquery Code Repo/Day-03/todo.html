<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="todo.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Smart Tasker</h1>

      <div class="input-group">
        <input type="text" placeholder="Add a new task" id="taskInput" />
        <select id="category">
          <option value="work">Work</option>
          <option value="personal">Personal</option>
          <option value="urgent">Urgent</option>
        </select>
        <button id="addBtn">Add</button>
      </div>
      <div class="search-filters">
        <input type="text" placeholder="Search Tasks" id="search" />
        <div class="filters">
          <button data-filter="all" class="active">All</button>
          <button data-filter="work">Work</button>
          <button data-filter="personal">Personal</button>
          <button data-filter="urgent">Urgent</button>
        </div>
      </div>
      <ul id="taskList">
        <!-- <li class="task-item completed">
          <input type="checkbox" />
          <span class="task-text">Read Book</span>
          <span class="task-category">Personal</span>
          <button class="delete-btn">X</button>
        </li> 
        <div class="empty-state">No tasks yet. Add one above!</div>
        -->
      </ul>
    </div>
    <script src="jquery.js"></script>
  </body>
</html>
