<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #box {
        width: 200px;
        height: 200px;
        border: 1px solid #ccc;
        padding: 10px;
        margin-top: 20px;
        color: #fff;
        background-color: rebeccapurple;
      }
    </style>
  </head>
  <body>
    <button id="btnHide">Hide</button>
    <button id="btnShow">Show</button>
    <button id="btnToggle">Toggle</button>
    <hr />
    <button id="btnFadeIn">FadeIn</button>
    <button id="btnFadeOut">FadeOut</button>
    <button id="btnFadeToggle">FadeToggle</button>
    <hr />

    <button id="btnSlideUp">Slide Up</button>
    <button id="btnSlideDown">Slide Down</button>
    <button id="btnSlideToggle">Slide Toggle</button>

    <hr />
    <button id="btnFadeTo">fadeTo</button>
    <button id="btnCallback">Callback</button>
    <button id="btnChain">Chaining</button>
    <button id="btnStop">Stop</button>

    <div id="box">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Atque fugiat quod deserunt praesentium impedit temporibus!</div>

    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script>
      $("#btnHide").click(function () {
        //$("#box").hide();
        ///$("#box").hide(1000);
        $("#box").hide("slow");
      });

      $("#btnShow").click(function () {
        //$("#box").show();
        $("#box").show(1000);
      });

      $("#btnToggle").click(function () {
        //$("#box").toggle();
        $("#box").toggle(1000);
      });

      $("#btnFadeIn").click(function () {
        $("#box").fadeIn(2000);
      });

      $("#btnFadeOut").click(function () {
        $("#box").fadeOut(2000);
      });

      $("#btnFadeToggle").click(function () {
        $("#box").fadeToggle();
      });

      $("#btnSlideUp").click(function () {
        $("#box").slideUp(2000);
      });
      $("#btnSlideDown").click(function () {
        $("#box").slideDown(2000);
      });

      $("#btnSlideToggle").click(function () {
        $("#box").slideToggle(2000);
      });

      $("#btnFadeTo").click(function () {
        $("#box").fadeTo(2000, 0.5);
      });

      $("#btnCallback").click(function () {
        $("#box").slideUp("slow", function () {
          $("#box").slideDown("slow");
        });
      });

      $("#btnChain").click(function () {
        $("#box").slideUp(2000).slideDown(2000);
      });

      $("#btnStop").click(function () {
        $("#box").stop();
      });
    </script>
  </body>
</html>
