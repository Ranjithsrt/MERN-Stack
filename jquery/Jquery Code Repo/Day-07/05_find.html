<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Document</title>
    <style>
      .box,
      .box * {
        padding: 10px;
        border: 4px solid #ccc;
        margin-bottom: 5px;
        display: block;
        list-style: none;
      }
    </style>
  </head>
  <body>
    <div class="box">
      .box-Father
      <p>
        p-(child)
        <span>Span-(grandchild)</span>
      </p>
      <p>
        p-(child)
        <span>Span-(grandchild)</span>
      </p>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script>
      // $(".box").find("span").css("border-color", "brown");

      const spanElements = document.querySelectorAll(".box span");
      spanElements.forEach((span) => {
        span.style.borderColor = "Orange";
      });
    </script>
  </body>
</html>
