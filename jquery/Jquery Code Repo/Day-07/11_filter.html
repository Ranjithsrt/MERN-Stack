<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    div {
      padding: 5px;
      margin: 5px;
      border: 2px solid #ccc;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>
  <div>this is div 1</div>
  <div>this is div 2</div>
  <div class="box">this is div 3</div>
  <div class="box">this is div 4</div>
  <div>this is div 5</div>
  <div class="box">this is div 6</div>
  <div>this is div 7</div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <script>
    $("div").filter(".box").css({ background: "aqua" });
    $("div").not(".box").css({ background: "blue" });
  </script>

  <script>
    // javascript
    document.addEventListener("DOMContentLoaded", function () {
      let divs = document.querySelectorAll("div .box");

      divs.forEach((div) => {
        div.style.background = "aqua";
      });
    });

    document.addEventListener("DOMContentLoaded", function () {
      let divs = document.querySelectorAll("div:not(.box)");

      divs.forEach((div) => {
        div.style.background = "blue";
      });
    });
  </script>
</body>

</html>
