<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>first | eq | last</title>
    <style>
      .box {
        padding: 5px;
        margin: 5px;
        border: 2px solid #ccc;
        margin-bottom: 5px;
      }
    </style>
  </head>
  <body>
    <div class="box">this is div 1</div>
    <div class="box">this is div 2</div>
    <div class="box">this is div 3</div>
    <div class="box">this is div 4</div>
    <div class="box">this is div 5</div>
    <div class="box">this is div 6</div>
    <div class="box">this is div 7</div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
      $(".box").first().css("background", "red");
      $(".box").eq(2).css("background", "red");

      $(".box").last().css("background", "red");
    </script>

    <script>
      // javascript
      document.addEventListener("DOMContentLoaded", function () {
        let box = document.querySelectorAll(".box");
        box[0].style.background = "red";
        box[2].style.background = "orange";
        box[6].style.background = "green";
      });

    </script>
  </body>
</html>
