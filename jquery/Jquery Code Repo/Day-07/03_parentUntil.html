<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>parentsUntil</title>
    <style>
      .box * {
        padding: 10px;
        border: 4px solid #ccc;
        margin-bottom: 5px;
        display: block;
        list-style: none;
      }
    </style>
  </head>
  <body>
    <div class="box">
      div
      <div>
        ul
        <ul class="ulTag">
          li
          <li>
            <span>Span</span>
          </li>
        </ul>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script>
      //  $("span").parentsUntil(".box").css("border-color", "green");

      const spans = document.querySelectorAll("span");
      spans.forEach((span) => {
        let parent = span.parentElement; //li
        while (parent && !parent.classList.contains("box")) {
          console.log(parent); //li ul div
          parent.style.borderColor = "red";
          parent = parent.parentElement; //ul div
        }
      });
    </script>
  </body>
</html>
