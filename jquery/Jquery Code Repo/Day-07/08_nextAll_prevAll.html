<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 5px;
      }
      .parent *,
      .parent {
        padding: 5px;
        border: 2px solid #ccc;
        margin-bottom: 5px;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      parent
      <h3>H3 Tag-1 - child</h3>
      <p>Para Tag - child</p>
      <p>Para Tag - child</p>
      <h2>H2 Tag - child</h2>
      <div id="innerDiv">
        div - child
        <p>para inside div - Grand child</p>
      </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <script>
      $("h2").prevAll().css("border-color", "green");
      $("h2").nextAll().css("border-color", "brown");
    </script>
    <script>
      // javascript

       document.addEventListener("DOMContentLoaded", function () {
        let h2 = document.querySelector("h2");
         let nextElements = h2.nextElementSibling;
         while (nextElements) {
            nextElements.style.borderColor = "green";
            nextElements = nextElements.nextElementSibling;
         }
      });

      document.addEventListener("DOMContentLoaded", function () {
        let h2 = document.querySelector("h2");
         let prevElements = h2.previousElementSibling;
         while (prevElements) {
            prevElements.style.borderColor = "brown";
            prevElements = prevElements.previousElementSibling;
         }
      });

    </script>
  </body>
</html>
