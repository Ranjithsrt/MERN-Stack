<!DOCTYPE html>
<html>
  <head>
    <title>Buttons</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  </head>
  <body>
    <div class="container">
      <div class="p-5 bg-light d-flex flex-wrap gap-3">
        <button>Click Me</button>
        <button class="btn">btn</button>
        <button class="btn btn-primary">btn-primary</button>
        <button class="btn btn-secondary">btn-secondary</button>
        <button class="btn btn-success">btn-success</button>
        <button class="btn btn-danger">btn-danger</button>
        <button class="btn btn-warning">btn-warning</button>
        <button class="btn btn-light">btn-light</button>
        <button class="btn btn-dark">btn-dark</button>
        <button class="btn btn-info">btn-info</button>
        <button class="btn btn-link">btn-link</button>

        <input class="btn btn-success" type="button" value="input-button" />
        <input class="btn btn-success" type="submit" value="submit" />
        <input class="btn btn-success" type="reset" value="reset" />
        <a class="btn btn-success" href="#">Click Me</a>

        <button type="button" class="btn btn-outline-primary">Primary</button>
        <button type="button" class="btn btn-outline-secondary">Secondary</button>
        <button type="button" class="btn btn-outline-success">Success</button>
        <button type="button" class="btn btn-outline-info">Info</button>
        <button type="button" class="btn btn-outline-warning">Warning</button>
        <button type="button" class="btn btn-outline-danger">Danger</button>
        <button type="button" class="btn btn-outline-dark">Dark</button>
        <button type="button" class="btn btn-outline-light text-dark">Light</button>

        <button type="button" disabled class="btn btn-primary btn-block">Default</button>
        <button type="button" class="btn btn-primary btn-block">
          <span class="spinner-border spinner-border-sm"></span>
        </button>
        <button type="button" class="btn btn-primary btn-block">
          <span class="spinner-border spinner-border-sm"></span>
          Loading
        </button>
        <button type="button" disabled class="btn btn-primary btn-block">
          <span class="spinner-grow spinner-grow-sm"></span>
          Loading
        </button>
      </div>

      <div class="p-5">
        <button type="button" class="btn btn-primary btn-lg">Large</button>
        <button type="button" class="btn btn-primary">Default</button>
        <button type="button" class="btn btn-primary btn-sm">Small</button>
      </div>

      <div style="width: 200px" class="bg-secondary p-3 d-grid gap-3">
        <button type="button" class="btn btn-primary btn-block">Default</button>
        <button type="button" class="btn btn-primary btn-block">Default</button>
        <button type="button" class="btn btn-primary btn-block">Default</button>
      </div>
    </div>
  </body>
</html>
