<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" />

    <style>
      .box {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 20px;
      }

      [class^="border"] {
        background-color: antiquewhite;
        width: 100px;
        height: 100px;
      }
    </style>
  </head>
  <body>
    <h3 class="text-center text-warning border-bottom py-3">Border in Bootstrap</h3>
    <div class="box">
      <div class="border"></div>
      <div class="border-top"></div>
      <div class="border-end"></div>
      <div class="border-bottom"></div>
      <div class="border-start"></div>

      <!--Subtractive Border-->
      <div class="border border-top-0"></div>
      <div class="border border-end-0"></div>
      <div class="border border-bottom-0"></div>
      <div class="border border-start-0"></div>

      <!--Border Colors-->

      <div class="border border-primary"></div>
      <div class="border border-secondary"></div>
      <div class="border border-success"></div>
      <div class="border border-danger"></div>
      <div class="border border-light"></div>
      <div class="border border-white"></div>
      <div class="border border-dark"></div>

      <!--Border size-->

      <div class="border border-primary"></div>
      <div class="border border-primary border-1"></div>
      <div class="border border-primary border-2"></div>
      <div class="border border-primary border-3"></div>
      <div class="border border-primary border-4"></div>
      <div class="border border-primary border-5"></div>
      <!--Border color opacity-->
      <div class="border border-primary border-5 border-opacity-75"></div>
      <div class="border border-primary border-5 border-opacity-50"></div>
      <div class="border border-primary border-5 border-opacity-25"></div>
      <div class="border border-primary border-5 border-opacity-10"></div>

      <!--Border Radius-->
      <div class="border border-primary border-2 rounded"></div>
      <div class="border border-primary border-2 rounded-top"></div>
      <div class="border border-primary border-2 rounded-bottom"></div>
      <div class="border border-primary border-2 rounded-end"></div>
      <div class="border border-primary border-2 rounded-start"></div>

      <!--Border Radius Size-->

      <div class="border border-primary border-2 rounded"></div>
      <div class="border border-primary border-2 rounded-0"></div>
      <div class="border border-primary border-2 rounded-1"></div>
      <div class="border border-primary border-2 rounded-2"></div>
      <div class="border border-primary border-2 rounded-3"></div>
      <div class="border border-primary border-2 rounded-4"></div>
      <div class="border border-primary border-2 rounded-5"></div>
      <div class="border border-primary border-2 rounded-circle"></div>
      <div style="height: 50px" class="border border-primary border-2 rounded-pill"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
