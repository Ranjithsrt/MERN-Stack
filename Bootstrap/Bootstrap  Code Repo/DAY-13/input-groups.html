<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Elements</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../base.css" />
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col-md-6">
          <form>
            <div class="input-group mb-3">
              <span class="input-group-text">
                <i class="bi bi-person-fill"></i>
              </span>
              <input type="text" class="form-control" placeholder="Name" />
            </div>

            <div class="input-group mb-3">
              <input type="email" class="form-control" placeholder="Email" />
              <span class="input-group-text"> @tutorjoes.com </span>
            </div>
            <div class="input-group mb-3 input-group-sm">
              <input type="email" class="form-control" placeholder="Email" />
              <span class="input-group-text"> @tutorjoes.com </span>
            </div>
            <div class="input-group mb-3 input-group-lg">
              <input type="email" class="form-control" placeholder="Email" />
              <span class="input-group-text"> @tutorjoes.com </span>
            </div>

            <div class="input-group mb-3">
              <span class="input-group-text">Rs.</span>
              <input type="number" class="form-control" placeholder="Price" />
              <span class="input-group-text">.00</span>
            </div>

            <div class="input-group mb-3">
              <div class="input-group-text">
                <input type="checkbox" />
              </div>
              <input type="text" class="form-control" />
            </div>

            <div class="input-group mb-3">
              <input type="search" class="form-control" />
              <button class="btn btn-danger">
                <i class="bi bi-search"></i>
              </button>
            </div>

            <div class="input-group mb-3">
              <button class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown">DropDown</button>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Mr.</a></li>
                <li><a class="dropdown-item" href="#">Mrs.</a></li>
              </ul>
              <input type="search" class="form-control" />
              <button class="btn btn-danger">
                <i class="bi bi-search"></i>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
