<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Elements</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="offset-md-2 col-md-8">
        <h3 class="my-3 text-primary fw-normal text-uppercase fs-5 fw-bold border-bottom py-3"><i class="bi bi-people"></i> Registration Form</h3>
        <div class="mb-3">
          <label for="name" class="form-label fw-medium">Name</label>
          <input type="text" class="form-control form-control-sm" placeholder="Enter fullname" />
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="mb-3">
              <label for="password" class="form-label fw-medium">Password</label>
              <input type="password" class="form-control form-control-sm" placeholder="Enter password" />
            </div>
          </div>
          <div class="col-md-6">
            <div class="mb-3">
              <label for="password" class="form-label fw-medium">Confirm Password</label>
              <input type="password" class="form-control form-control-sm" placeholder="Confirm password" />
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label for="courses" class="form-label fw-medium">Courses</label>
          <select id="courses" class="form-select">
            <option value="">Select Course</option>
            <option value="C">C</option>
            <option value="C++">C++</option>
            <option value="Java">Java</option>
            <option value="JavaScript">JavaScript</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="remarks">Remarks</label>
          <textarea class="form-control" rows="5"></textarea>
        </div>
        <div class="mb-3">
          <button class="btn btn-primary">Register Now</button>
          <button class="btn btn-danger">Clear All</button>
        </div>
      </div>
    </div>
  </body>
</html>
