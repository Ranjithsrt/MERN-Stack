<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Colors in Bootstrap</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

    <style>
      .text-primary {
        color: purple !important;
      }
      .bg-primary {
        background-color: purple !important;
      }
    </style>
  </head>
  <body style="background-color: palegreen">
    <div class="container">
      <h2>Colors in Bootstrap</h2>

      <h3>Text Colors</h3>

      <h4 class="text-primary">Welcome to primary</h4>
      <h4 class="text-secondary">Welcome to secondary</h4>
      <h4 class="text-success">Welcome to success</h4>
      <h4 class="text-danger">Welcome to danger</h4>
      <h4 class="text-warning">Welcome to warning</h4>
      <h4 class="text-info">Welcome to info</h4>
      <h4 class="text-dark">Welcome to dark</h4>
      <h4 class="text-white">Welcome to white</h4>

      <h4 class="text-bg-primary bg-primary  ">Welcome to primary</h4>

      <h4 class="text-bg-secondary bg-secondary">Welcome to primary</h4>
      <hr />

      <h4 class="text-bg-warning bg-warning">Welcome to primary</h4>
      <hr />

      <div style="width: 200px; height: 200px" class="bg-primary"></div>

      <div style="width: 200px; height: 200px" class="bg-secondary"></div>

      <div style="width: 200px; height: 200px" class="bg-success"></div>
      <div style="width: 200px; height: 200px" class="bg-warning"></div>
      <div style="width: 200px; height: 200px" class="bg-danger"></div>
      <div style="width: 200px; height: 200px" class="bg-info"></div>
      <div style="width: 200px; height: 200px" class="bg-dark"></div>
      <div style="width: 200px; height: 200px" class="bg-light"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
