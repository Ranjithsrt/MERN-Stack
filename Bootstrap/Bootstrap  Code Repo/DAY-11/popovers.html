<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PopOver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="p-5">
    <button type="button" class="btn btn-lg btn-danger" data-bs-toggle="popover" data-bs-title="Popover title" data-bs-content="And here’s some amazing content. It’s very engaging. Right?">Click to toggle popover</button>

    <button type="button" class="btn btn-lg btn-danger" data-bs-toggle="popover" data-bs-title="Popover title" data-bs-content="And here’s some amazing content. It’s very engaging. Right?" data-bs-trigger="hover">hover to toggle popover</button>

    <div class="d-flex p-5 border m-3 gap-3 justify-content-center align-items-center">
      <button class="btn btn-info" data-bs-toggle="popover" data-bs-content="This is sample content." data-bs-placement="left" data-bs-title="Left">Left</button>
      <button class="btn btn-info" data-bs-toggle="popover" data-bs-content="This is sample content." data-bs-placement="top" data-bs-title="Top">Top</button>
      <button class="btn btn-info" data-bs-toggle="popover" data-bs-content="This is sample content." data-bs-placement="bottom" data-bs-title="Bottom">Bottom</button>
      <button class="btn btn-info" data-bs-toggle="popover" data-bs-content="This is sample content." data-bs-placement="right" data-bs-title="Right">Right</button>
    </div>
    <script>
      const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]');
      const popoverList = [...popoverTriggerList].map((popoverTriggerEl) => new bootstrap.Popover(popoverTriggerEl));
    </script>
  </body>
</html>
