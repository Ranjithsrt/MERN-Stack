<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Elements</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div class="container mt-3 d-flex justify-content-center align-items-center" style="height: 100vh">
      <div class="shadow p-5 rounded-circle" style="width: 450px">
        <div class="card-header">
          <div class="card-title fw-semibold fs-4 text-center">User Login</div>
        </div>
        <form class="card-body">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control form-control-sm" placeholder="Enter Email" id="email" />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control form-control-sm" placeholder="Enter Password" id="password" />
          </div>
          <div class="form-check mb-3">
            <label class="form-check-label">
              <input type="checkbox" class="form-check-input" />
              Remember Me
            </label>
          </div>
          <div class="d-flex gap-2 justify-content-center">
            <button class="btn btn-primary">Login</button>
            <button class="btn btn-danger">Clear All</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
