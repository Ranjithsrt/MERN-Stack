<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html"><i class="bi bi-phone-vibrate"></i> BlinkCart</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="home.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Product</a>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false"> Brand </a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Apple</a></li>
                <li><a class="dropdown-item" href="#">Redmi</a></li>
                <li><hr class="dropdown-divider" /></li>
                <li><a class="dropdown-item" href="#">Oppo</a></li>
              </ul>
            </li>
          </ul>
          <button class="btn btn-primary">
            <i class="bi bi-bag-fill"></i>
            Cart
            <span class="badge text-primary rounded-pill bg-white border border-primary">2</span>
          </button>
        </div>
      </div>
    </nav>

    <header class="bg-dark py-5">
      <div class="container px-4 px-lg-5 my-5">
        <div class="text-white text-center">
          <h1 class="display-4 fw-bolder"><i class="bi bi-phone-vibrate"></i> BlinkCart</h1>
          <p class="lead text-white-50 fw-normal mb-0">Smart Living, One Tap Away</p>
        </div>
      </div>
    </header>

    <section class="py-5">
      <div class="container px-4 px-lg-5 mt-5">
        <div class="row g-4 row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4" id="product-grid"></div>
      </div>
    </section>

    <footer class="py-5 bg-dark">
      <div class="container">
        <p class="mb-0 text-center text-white lead">Copyright &copy; BlinkCart 2025</p>
      </div>
    </footer>

    <script>
      const card = `
        <div class="col">
            <div class="card h-100">
              <img src="https://placehold.co/450x300" alt="mobile" class="card-img-top" />
              <div class="card-body p-4">
                <div class="text-center">
                  <h5 class="mb-3">Oppo A5 5G</h5>
                  <div class="mb-4 d-flex gap-2 justify-content-center">
                    <span class="text-decoration-line-through">₹ 16499</span>
                    <span>₹ 15499</span>
                  </div>
                  <button class="btn btn-dark">Add to cart</button>
                </div>
              </div>
            </div>
          </div>
      `;

      const productGrid = document.getElementById("product-grid");
      productGrid.innerHTML = "";
      for (let i = 1; i <= 20; i++) {
        productGrid.innerHTML += card;
      }
    </script>
  </body>
</html>
