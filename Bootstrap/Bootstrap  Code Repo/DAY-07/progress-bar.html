<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="p-5">
    <div class="progress mb-3">
      <div class="progress-bar" style="width: 20%"></div>
    </div>

    <div class="progress mb-3" style="height: 20px">
      <div class="progress-bar" style="width: 20%"></div>
    </div>
    <div class="progress mb-3" style="height: 16px">
      <div class="progress-bar" style="width: 20%"></div>
    </div>
    <div class="progress mb-3" style="height: 10px">
      <div class="progress-bar" style="width: 20%"></div>
    </div>

    <div class="progress mb-3">
      <div class="progress-bar" style="width: 70%">70%</div>
    </div>

    <hr />

    <div class="progress mb-3">
      <div class="progress-bar" style="width: 80%">80%</div>
    </div>
    <div class="progress mb-3">
      <div class="progress-bar bg-secondary" style="width: 80%">80%</div>
    </div>
    <div class="progress mb-3">
      <div class="progress-bar bg-danger" style="width: 80%">80%</div>
    </div>
    <div class="progress mb-3">
      <div class="progress-bar bg-success" style="width: 80%">80%</div>
    </div>
    <div class="progress mb-3">
      <div class="progress-bar bg-warning" style="width: 80%">80%</div>
    </div>
    <div class="progress mb-3">
      <div class="progress-bar bg-dark" style="width: 80%">80%</div>
    </div>

    <hr />

    <div class="progress mb-3">
      <div class="progress-bar progress-bar-striped" style="width: 80%">80%</div>
    </div>

    <div class="progress mb-3">
      <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 80%">80%</div>
    </div>

    <hr />

    <div class="progress">
      <div class="progress-bar bg-success" style="width: 20%">Photos</div>
      <div class="progress-bar bg-danger" style="width: 50%">Videos</div>
      <div class="progress-bar bg-warning" style="width: 10%">Files</div>
    </div>
  </body>
</html>
