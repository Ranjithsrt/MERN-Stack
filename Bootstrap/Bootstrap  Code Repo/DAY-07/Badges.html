<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="p-5">
    <h1>This Sample tag <span class="badge bg-dark">new</span></h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Optio provident quos officia ipsam omnis, placeat enim adipisci est quis. Aliquam similique aperiam inventore <span class="badge bg-success">aliquid</span> tenetur soluta maxime aut ut facere.</p>

    <div class="d-flex border border-1 p-3 w-50 gap-3 flex-wrap mb-3">
      <span class="badge bg-primary">new</span>
      <span class="badge bg-secondary">new</span>
      <span class="badge bg-warning">new</span>
      <span class="badge bg-light text-bg-light">new</span>
      <span class="badge bg-info">new</span>
      <span class="badge bg-success">new</span>
      <span class="badge bg-danger">new</span>
    </div>
    <div class="d-flex border border-1 p-3 w-50 gap-3 flex-wrap mb-3">
      <span class="badge rounded-pill bg-primary">new</span>
      <span class="badge rounded-pill bg-secondary">new</span>
      <span class="badge rounded-pill bg-warning">new</span>
      <span class="badge rounded-pill bg-light text-bg-light">new</span>
      <span class="badge rounded-pill bg-info">new</span>
      <span class="badge rounded-pill bg-success">new</span>
      <span class="badge rounded-pill bg-danger">new</span>
    </div>

    <button class="btn btn-dark">
      Messages
      <span class="badge bg-warning text-bg-warning rounded-pill">55</span>
    </button>
