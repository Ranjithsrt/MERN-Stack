<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Page Title -->
    <title>Netflix</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="./img/Netflix-Logo-PNG-File.png  " alt="Netflix Logo" width="200" />
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous" />
    <!-- Bootstrap Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <!-- CSS style sheet -->
    <link rel="stylesheet" href="./style.css" />
</head>

<body class="bg-black text-light" style="background-image: url('./img/bg.jpg')">

    <!-- Netflix Logo -->
    <span>
        <img src="./img/Logo.svg" alt="" class="position-absolute top-0 start-0 m-5 img-fluid " style="width:150px;" />
    </span>
    
    <!-- sign-in -->
    <section class="d-flex justify-content-center align-items-center" style="height: 100vh">
        <!-- sign-in form -->
        <div class="container d-flex flex-column justify-content-center align-items-center bg-black
         rounded-3
        
        p-5 w-50">
            <h4 class="my-3">Sign In</h4>
            <!-- form -->
            <div>
                <input type="email" class="form-control mb-3" placeholder="Email or phone number" />
                <input type="password" class="form-control mb-3" placeholder="Password" />
                <button class="btn btn-danger d-block w-100">Sign In</button>
                <h3 class="text-white my-3 small text-center">OR</h3>
                <button class="btn btn-danger d-block w-100">
                    Use a sign-in code
                </button>
                <br />
                <a href="#" class="text-white text-decoration-underline text-center d-block my-3">Forgot Password?</a>
                <br />
                <input type="checkbox" name="" id="remember-me" class="form-check-input" />
                <label for="remember-me" class="form-check-label">Remember me</label>
                <br />
                <h3 class="my-3 small">
                    New to Netflix?
                    <a href="#" class="text-white text-decoration-underline">Sign up now
                    </a>
                </h3>
                <p class="small">
                    This page is protected by Google reCAPTCHA to ensure you're not a
                    bot.
                </p>

                <a href="#">Learn more</a>
            </div>
        </div>
    </section>
</body>

</html>
