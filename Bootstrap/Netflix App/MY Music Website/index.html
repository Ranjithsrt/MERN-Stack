<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <!-- Bootstrap Icons CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light" style="min-height: 100vh">
    <!-- Header -->
    <header class="position-fixed top-0 w-100 z-1">
      <nav >
        <h3 class="text-center text-bg-dark p-5">Fake Music Player web app</h3>
      </nav>
    </header>
    <!-- Main Content section -->
    <main>
      <!-- Music Player Section -->
      <section class="container mt-5 bg-light border rounded shadow-lg p-5">
        <h1 class="text-center mb-5 display-5">Music Player</h1>
        <!-- Music Cards -->
        <div
          class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"
          id="music-player-list"
        ></div>
      </section>
    </main>

    <!-- Footer -->
    <footer >
      <p class=" position-fixed bottom-0 w-100 text-center text-bg-dark p-5">Copyright &copy; 2023</p>
    </footer>

    <!-- Bootstrap CDN -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
    <script src="./script.js"></script>
  </body>
</html>
